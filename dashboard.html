<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COHESION — Match Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
[data-theme="dark"]{
  --bg:#181820;--panel:#1e1e28;--card:#252530;--hover:#2c2c3a;
  --border:rgba(255,255,255,0.08);--t1:#f0f0f5;--t2:#8888a0;--t3:#52526a;
  --accent:#4fc3f7;--accent-bg:rgba(79,195,247,0.1);--gold:#ffd700;--shadow:rgba(0,0,0,0.4);
  --score-bg:rgba(255,215,0,0.12);--won-bg:rgba(76,175,80,0.12);--lost-bg:rgba(244,67,54,0.12);
}
[data-theme="light"]{
  --bg:#f0eeeb;--panel:#ffffff;--card:#f7f6f3;--hover:#ebe9e5;
  --border:rgba(0,0,0,0.09);--t1:#1a1a28;--t2:#555572;--t3:#888899;
  --accent:#0369a1;--accent-bg:rgba(3,105,161,0.08);--gold:#b45309;--shadow:rgba(0,0,0,0.12);
  --score-bg:rgba(180,83,9,0.1);--won-bg:rgba(21,128,61,0.1);--lost-bg:rgba(185,28,28,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
@media(max-width:767px){html,body{height:auto;overflow-y:auto;}}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column;transition:background .2s,color .2s;}
header{height:50px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:100;}
.back-btn{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:6px;font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:var(--t2);border:1px solid var(--border);background:var(--card);text-decoration:none;transition:all .15s;flex-shrink:0;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.game-title{font:600 13px 'Barlow Condensed',sans-serif;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.game-title strong{color:var(--t1);}
.hdr-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.hdr-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:5px 9px;border-radius:6px;font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:var(--t2);border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .15s;white-space:nowrap;}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
.hdr-btn.round{width:32px;height:32px;padding:0;border-radius:50%;font-size:14px;}
main{flex:1;display:grid;grid-template-columns:380px 1fr;overflow:hidden;}
.left-panel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}
.view-toggle{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel);}
.vt-btn{flex:1;padding:8px 6px;font:700 15px 'Barlow Condensed',sans-serif;letter-spacing:.8px;text-transform:uppercase;color:var(--t3);background:none;border:none;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;}
.vt-btn.on{color:var(--accent);border-bottom-color:var(--accent);}
.vt-btn:hover:not(.on){color:var(--t2);}
.controls{padding:9px 11px 7px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.search-row{position:relative;margin-bottom:6px;}
.search-row input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 10px 6px 28px;color:var(--t1);font:16px 'Barlow',sans-serif;outline:none;transition:border-color .2s;}
.search-row input:focus{border-color:var(--accent);}
.search-row input::placeholder{color:var(--t3);}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:12px;pointer-events:none;}
.filters-row{display:flex;gap:4px;margin-bottom:6px;}
select{flex:1;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 5px;color:var(--t1);font:14px 'Barlow',sans-serif;outline:none;cursor:pointer;}
select:focus{border-color:var(--accent);}
select option{background:var(--card);}
.chips-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px;}
.chip{padding:3px 10px;border-radius:20px;font:600 14px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);transition:all .12s;white-space:nowrap;}
.chip:hover:not(.on){border-color:var(--t2);}
.chip.on{color:#fff;}
.chip[data-c="All"].on{background:#4fc3f7;border-color:#4fc3f7;}
.statbar{display:flex;gap:5px;margin-top:4px;}
.sp{background:var(--card);border-radius:4px;padding:2px 7px;font-size:13px;color:var(--t2);}
.sp b{color:var(--t1);}
.event-scroller{flex:1;overflow-y:auto;}
.lbl-active-bar{display:none;align-items:center;gap:6px;padding:5px 11px;background:var(--accent-bg);border-bottom:1px solid var(--border);font:600 10px 'Barlow Condensed',sans-serif;color:var(--accent);}
.lbl-active-bar.show{display:flex;}
.lbl-clear{cursor:pointer;padding:1px 5px;border-radius:3px;background:var(--card);border:1px solid var(--border);color:var(--t2);font-size:10px;margin-left:auto;}
.lbl-clear:hover{color:var(--t1);}
/* Events view */
.ev-group{border-bottom:1px solid var(--border);}
.ev-hdr{display:flex;align-items:center;padding:7px 10px;cursor:pointer;gap:6px;transition:background .1s;user-select:none;}
.ev-hdr:hover{background:var(--hover);}
.ev-arr{font-size:8px;color:var(--t3);width:10px;flex-shrink:0;transition:transform .15s;}
.ev-arr.o{transform:rotate(90deg);}
.ev-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.ev-name{font:700 12px 'Barlow Condensed',sans-serif;flex:1;letter-spacing:.3px;}
.ev-cnt{font:700 10px 'Barlow Condensed',sans-serif;color:var(--accent);background:var(--accent-bg);padding:1px 6px;border-radius:10px;}
.ev-insts{background:var(--bg);}
.ev-inst{display:grid;grid-template-columns:76px 1fr;padding:7px 12px 7px 24px;border-top:1px solid var(--border);cursor:pointer;gap:5px;transition:background .1s;}
.ev-inst:hover{background:var(--card);}
.ev-inst.on{background:var(--card);border-left:2px solid var(--accent);padding-left:22px;}
.inst-t{font:700 17px 'Barlow Condensed',sans-serif;color:var(--accent);line-height:1.3;white-space:nowrap;}
.inst-vs{font-size:15px;color:var(--t3);}
.inst-b{min-width:0;}
.inst-pl{font:600 15px 'Barlow',sans-serif;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.inst-sb{font-size:14px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Labels view */
.lbl-group{border-bottom:1px solid var(--border);}
.lbl-hdr{display:flex;align-items:center;padding:7px 10px;cursor:pointer;gap:6px;transition:background .1s;user-select:none;}
.lbl-hdr:hover{background:var(--hover);}
.lbl-arr{font-size:8px;color:var(--t3);width:10px;flex-shrink:0;transition:transform .15s;}
.lbl-arr.o{transform:rotate(90deg);}
.lbl-gname{font:700 12px 'Barlow Condensed',sans-serif;flex:1;letter-spacing:.3px;}
.lbl-gcnt{font:700 10px 'Barlow Condensed',sans-serif;color:var(--t3);padding:1px 5px;border-radius:10px;background:var(--card);}
.lbl-vals{background:var(--bg);}
.lbl-val{display:flex;align-items:center;padding:5px 10px 5px 20px;border-top:1px solid var(--border);cursor:pointer;gap:5px;transition:background .1s;}
.lbl-val:hover{background:var(--card);}
.lbl-val.on{background:var(--accent-bg);border-left:2px solid var(--accent);padding-left:18px;}
.lbl-varr{font-size:7px;color:var(--t3);width:8px;flex-shrink:0;transition:transform .15s;}
.lbl-varr.o{transform:rotate(90deg);}
.lbl-vname{font:600 11px 'Barlow',sans-serif;color:var(--t2);flex:1;}
.lbl-vcnt{font:700 10px 'Barlow Condensed',sans-serif;color:var(--accent);}
.lbl-einsts{background:var(--bg);}
.lbl-einst{display:grid;grid-template-columns:52px 1fr;padding:4px 10px 4px 30px;border-top:1px solid var(--border);cursor:pointer;gap:5px;transition:background .1s;}
.lbl-einst:hover{background:var(--card);}
.lbl-einst.on{background:var(--card);border-left:2px solid var(--accent);}
.empty{padding:28px 14px;text-align:center;color:var(--t3);font-size:11px;}
/* stats tab */
.stt-teams{display:flex;justify-content:space-between;padding:10px 12px 4px;font:800 13px 'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.stt-sec{padding:8px 12px 4px;border-bottom:1px solid var(--border);}
.stt-hd{font:800 12px 'Barlow Condensed',sans-serif;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.stt-sum{font-size:11px;color:var(--t2);margin-bottom:7px;display:flex;justify-content:space-between;gap:8px;}
.stt-row{display:grid;grid-template-columns:26px 1fr 108px 1fr 26px;align-items:center;gap:6px;margin-bottom:5px;}
.stt-n{font:700 11px 'Barlow Condensed',sans-serif;color:var(--t1);text-align:center;}
.stt-k{font-size:10px;color:var(--t2);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stt-bar{height:9px;background:var(--card);border-radius:4px;overflow:hidden;display:flex;}
.stt-bar span{height:100%;border-radius:4px;}
.stt-bar.r{justify-content:flex-end;}
.stt-prow{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:var(--t1);margin-bottom:4px;}
.stt-prow span:last-child{text-align:right;}
.stt-none{font-size:11px;color:var(--t3);padding:2px 0 6px;}
.stt-note{padding:10px 12px 16px;font-size:10px;color:var(--t3);text-align:center;}
.stt-per{display:flex;flex-wrap:wrap;gap:4px;padding:4px 12px 8px;border-bottom:1px solid var(--border);}
.stt-pc{padding:3px 9px;border-radius:5px;font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t3);}
.stt-pc:hover{border-color:var(--accent);color:var(--accent);}
.stt-pc.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.stt-n.clk,.stt-k.clk{cursor:pointer;}
.stt-n.clk:hover,.stt-k.clk:hover{color:var(--accent);text-decoration:underline;}
/* Right panel */
.right-panel{display:flex;flex-direction:column;overflow-y:auto;background:var(--panel);}
.vid-toolbar{display:flex;align-items:center;padding:6px 10px;gap:5px;border-bottom:1px solid var(--border);flex-shrink:0;}
.size-grp{display:flex;gap:2px;}
.sbtn{padding:3px 8px;border-radius:5px;font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);transition:all .12s;}
.sbtn:hover{border-color:var(--accent);color:var(--accent);}
.sbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
[data-theme="light"] .sbtn.on{color:#fff;}
.v-spacer{flex:1;}
.tbtn{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:6px;font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;transition:all .12s;text-decoration:none;white-space:nowrap;border:none;}
.tbtn-fs{background:var(--card);border:1px solid var(--border);color:var(--t2);}
.tbtn-fs:hover{border-color:var(--accent);color:var(--accent);}
.tbtn-yt{background:#ff0000;color:#fff;}
.tbtn-yt:hover{background:#cc0000;}
.vid-area{flex-shrink:0;background:#000;overflow:hidden;position:relative;}
#ytPlayerDiv{width:100%;height:100%;}
.vid-controls{display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 10px;background:var(--bg);border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.vc-btn{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:5px;cursor:pointer;color:var(--t2);background:var(--card);border:1px solid var(--border);font-size:13px;transition:all .12s;flex-shrink:0;user-select:none;}
.vc-btn:hover{color:var(--accent);border-color:var(--accent);}
.vc-btn.play{width:34px;height:34px;font-size:16px;color:var(--t1);border-color:var(--t3);}
.vc-btn.play:hover{color:var(--accent);border-color:var(--accent);}
.vc-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0;}
.vc-time{font:600 12px 'Barlow Condensed',sans-serif;color:var(--t2);letter-spacing:.3px;min-width:80px;text-align:center;}
.drag-handle{flex-shrink:0;height:8px;background:var(--panel);border-top:1px solid var(--border);border-bottom:1px solid var(--border);cursor:ns-resize;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.drag-handle:hover,.drag-handle.act{background:var(--accent-bg);}
.drag-handle::before{content:'';display:block;width:28px;height:2px;background:var(--t3);border-radius:1px;box-shadow:0 -3px 0 var(--t3),0 3px 0 var(--t3);}
.drag-handle:hover::before,.drag-handle.act::before{background:var(--accent);box-shadow:0 -3px 0 var(--accent),0 3px 0 var(--accent);}
.tl-section{flex-shrink:0;border-bottom:1px solid var(--border);}
.tl-bar{display:flex;align-items:center;padding:4px 8px;gap:5px;border-bottom:1px solid var(--border);background:var(--panel);}
.tl-pbtns{display:flex;gap:2px;}
.tl-pb{padding:2px 7px;border-radius:4px;font:700 9px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t3);transition:all .12s;}
.tl-pb:hover{border-color:var(--t2);color:var(--t2);}
.tl-pb.on{background:var(--accent);border-color:var(--accent);color:#fff;}
[data-theme="light"] .tl-pb.on{color:#fff;}
.tl-sp{flex:1;}
.tl-leg{display:flex;align-items:center;gap:8px;}
.tl-li{display:flex;align-items:center;gap:3px;font:600 9px 'Barlow Condensed',sans-serif;color:var(--t3);}
.tl-ld{width:8px;height:8px;border-radius:2px;}
.tl-zbtns{display:flex;gap:2px;}
.tl-zb{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font:700 13px 'Barlow Condensed',sans-serif;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);transition:all .12s;}
.tl-zb:hover{border-color:var(--accent);color:var(--accent);}
#tlTip{
  position:fixed;z-index:300;pointer-events:none;display:none;
  background:var(--panel);border:1px solid var(--border);border-radius:9px;
  padding:9px 13px;box-shadow:0 6px 24px var(--shadow);min-width:140px;max-width:220px;
}
.tlt-code{font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:var(--accent);margin-bottom:3px;}
.tlt-detail{font-size:11px;color:var(--t1);margin-bottom:2px;}
.tlt-time{font-size:10px;color:var(--t3);}
canvas#tlC{display:block;width:100%;cursor:crosshair;}
.now-playing{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.np-lbl{font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:2px;}
.np-name{font:800 14px 'Barlow Condensed',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.np-meta{font-size:10px;color:var(--t2);margin-top:1px;}
.np-time{font:700 10px 'Barlow Condensed',sans-serif;color:var(--accent);margin-top:2px;}
.nearby{flex:1;overflow-y:auto;padding:6px 8px;}
.nb-lbl{font-size:9px;letter-spacing:2px;color:var(--t3);text-transform:uppercase;padding:2px 4px 5px;}
.nbrow{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;cursor:pointer;margin-bottom:1px;border:1px solid transparent;transition:background .1s;}
.nbrow:hover{background:var(--hover);border-color:var(--border);}
.nb-t{font:700 10px 'Barlow Condensed',sans-serif;color:var(--accent);min-width:58px;}
.nb-c{font-size:10px;color:var(--t2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.idle{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:16px;gap:8px;}
.idle-icon{font-size:24px;opacity:.2;}
.idle-text{font-size:11px;color:var(--t3);line-height:1.9;}
.idle-text strong{color:var(--t2);}
.load-st{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--t3);font-size:12px;}
.spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
@media(max-width:767px){
  main{display:flex;flex-direction:column;overflow:visible;height:auto;}
  .right-panel{order:-1;border-bottom:1px solid var(--border);}
  .left-panel{border-right:none;height:auto;display:flex;flex-direction:column;}
  .event-scroller{overflow-y:visible;flex:none;}
  .now-playing,.nearby,.idle,.tl-section{display:none;}
  .drag-handle{display:none;}
  .game-title{display:none;}
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>

if(!sessionStorage.getItem('cohesion_auth')) window.location.href='index.html';
const isAdmin = sessionStorage.getItem('cohesion_auth') === 'admin';
function logout(){ netlifyIdentity.logout(); sessionStorage.clear(); window.location.href='index.html'; }

const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
function initTheme(){const t=localStorage.getItem('cohesion_theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('TH').textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('cohesion_theme',n);document.getElementById('TH').textContent=n==='dark'?'☀️':'🌙';drawTL();}
initTheme();
const gameId=new URLSearchParams(window.location.search).get('game');
if(!gameId) window.location.href='library.html';
let ALL=[],GAME={},filtered=[],PTM={};

let gameFormat='gi',activeCatFn=null,activeCatKey='All',activeSubFn=null,activeSubKey='';
let CHIP_FN_MAP={},SUB_FN_MAP={};

function driveToAngle(driveT,idx){
  if(idx===0||!GAME.angles)return driveT;
  const m=GAME.angles[0],t=GAME.angles[idx];
  let period,gck;
  if(m.et2Start&&driveT>=m.et2Start){period='et2';gck=driveT-m.et2Start;}
  else if(m.et1Start&&driveT>=m.et1Start){period='et1';gck=driveT-m.et1Start;}
  else if(driveT>=(m.half2Start||0)){period='2h';gck=driveT-(m.half2Start||0);}
  else{period='1h';gck=driveT-(m.half1Start||0);}
  const ts=period==='et2'?(t.et2Start??t.half2Start):period==='et1'?(t.et1Start??t.half2Start):period==='2h'?t.half2Start:t.half1Start;
  return Math.max(0,(ts||0)+gck);
}
// Maps a stored event's `half` field to the period key Visual Sync uses
// ('1st Half' -> '1H', etc.)
function mapHalfToVisualSyncPeriod(half){
  if(!half)return '1H';
  if(half.includes('ET')&&half.includes('2'))return 'ET2';
  if(half.includes('ET'))return 'ET1';
  if(half.includes('2'))return '2H';
  return '1H';
}
// Applies any saved Visual Sync correction to the Main angle's events.
// IMPORTANT: this must be added to ev.start (the untouched raw XML time,
// the same reference frame Visual Sync computed its offset against), NOT
// ev.driveT — driveT is already a transformed value (admin.html applies
// its own whistle-based period offset at upload time). Adding Visual
// Sync's offset to driveT compounds two different corrections and
// produces wildly wrong, often backward-shifted positions.
function applyVisualSyncCorrections(events){
  const segments = GAME.visualSync?.syncSegments?.main;
  if(!segments) return;
  events.forEach(ev=>{
    const periodKey = mapHalfToVisualSyncPeriod(ev.half);
    const segs = segments[periodKey];
    if(!segs || !segs.length) return;
    const offset = segs[segs.length-1].offset || 0;
    if(typeof ev.start === 'number'){
      ev.driveT = Math.max(0, Math.round(ev.start + offset));
    }
  });
}
function videoTimeToDrive(vt,idx){
  if(idx===0||!GAME.angles)return vt;
  const m=GAME.angles[0],t=GAME.angles[idx];
  let period,gck;
  if(t.et2Start&&vt>=t.et2Start){period='et2';gck=vt-t.et2Start;}
  else if(t.et1Start&&vt>=t.et1Start){period='et1';gck=vt-t.et1Start;}
  else if(vt>=(t.half2Start||0)){period='2h';gck=vt-(t.half2Start||0);}
  else{period='1h';gck=vt-(t.half1Start||0);}
  const ms=period==='et2'?(m.et2Start??m.half2Start):period==='et1'?(m.et1Start??m.half2Start):period==='2h'?m.half2Start:m.half1Start;
  return Math.max(0,(ms||0)+gck);
}

  const grp=document.getElementById('angleGrp');if(!grp)return;

function switchAngle(idx){
  if(idx===currentAngleIdx)return;
  const curDrive=YTP&&YTP.getCurrentTime?videoTimeToDrive(YTP.getCurrentTime(),currentAngleIdx):curT;
  currentAngleIdx=idx;
  const ang=GAME.angles[idx];
  const tgtVT=driveToAngle(curDrive,idx);
  if(YTP&&YTP.loadVideoById){YTP.loadVideoById({videoId:ang.youtubeId,startSeconds:Math.max(0,tgtVT)});}
  document.querySelectorAll('#angleGrp .sbtn').forEach((b,i)=>b.classList.toggle('on',i===idx));
  const ytbEl=document.getElementById('YTB');if(ytbEl)ytbEl.href=`https://youtu.be/${ang.youtubeId}`;
}

  YTP=new YT.Player('ytPlayerDiv',{
    videoId:ang.youtubeId,
    playerVars:{start:Math.max(0,ang.half1Start||0),rel:0,fs:1,modestbranding:1,enablejsapi:1,origin:window.location.origin},
    events:{

      onStateChange:function(e){if(e.data===1)startRAF();else stopRAF();},
      onError:function(e){
        console.warn('YT Error:',e.data);
        // Show fallback on embedding error (error code 150 = blocked embedding)
        if(e.data===150||e.data===2){
          document.getElementById('ytPlayerDiv').style.display='none';

function startRAF(){stopRAF();function f(){if(YTP&&YTP.getCurrentTime){const vt=YTP.getCurrentTime();vidT=videoTimeToDrive(vt,currentAngleIdx);updatePH(vidT);}rafID=requestAnimationFrame(f);}rafID=requestAnimationFrame(f);}

async function loadGame(){
  try{
    const [gameRes, eventsRes] = await Promise.all([
      _sb.from('games').select('meta').eq('id', gameId).single(),
      _sb.from('events').select('id, data').eq('game_id', gameId)
    ]);
    if(gameRes.error) throw gameRes.error;
    if(eventsRes.error) throw eventsRes.error;
    GAME = gameRes.data.meta || {};
    ALL  = (eventsRes.data || []).map(r => ({ ...r.data, _rowId: r.id }));
    applyVisualSyncCorrections(ALL);
    // The query has no ORDER BY, so rows arrive in physical table order —
    // which is only chronological by coincidence until any delete/reinsert
    // (re-parse, roster save, dedup) scrambles it. Sort into watch order
    // explicitly; nearby-event navigation in pickI() also relies on this.
    ALL.sort((a,b)=>(a.driveT??0)-(b.driveT??0)||(a.start??0)-(b.start??0));
    if(typeof dashRestoreBackup==='function'){ try{ await dashRestoreBackup(); }catch(_){} }
    buildPTM();init();
  }catch(e){
    document.getElementById('MA').innerHTML='<div class="load-st" style="text-align:center;padding:60px;color:var(--t3)"><div style="font-size:16px;color:var(--t2);margin-bottom:8px">Could not load match data</div><div style="font-size:12px">'+e.message+'</div></div>';
  }
}
function buildPTM(){
  ALL.forEach(ev=>{if(ev.player&&ev.team)PTM[ev.player]=ev.team;});
  ALL.forEach(ev=>{
    if(!ev.team){ev.team=PTM[ev.player]||PTM[ev.code]||'';}
    if(!ev.player&&PTM[ev.code]){ev.player=ev.code;}
  });
}

function populatePl(){
  const s=document.getElementById('FP');
  if(!s)return;
  const selectedTeam=document.getElementById('FT')?.value||'';
  const current=s.value;
  const players=[...new Set(
    ALL
      .filter(e => !selectedTeam || (e.team || '').toUpperCase() === selectedTeam.toUpperCase())
      .map(e => e.player)
      .filter(Boolean)
  )].sort();
  s.innerHTML='<option value="">All Players</option>';
  players.forEach(p=>{
    const o=document.createElement('option');
    o.value=p;
    o.textContent=p;
    s.appendChild(o);
  });
  if(players.includes(current)){
    s.value=current;
  }
}

function detectFormat(evs){
  if(!evs.length)return'gi';
  if(evs.some(e=>/\([PF]\)/.test(e.code)))return'giu';
  if(evs.some(e=>e.code===e.code.toUpperCase()&&/[A-Z]{2}/.test(e.code)))return'sc';
  return'gi';
}

function renderChips(){
  const catEl=document.getElementById('catChips');
  const subEl=document.getElementById('subChips');
  if(!catEl||!subEl)return;
  CHIP_FN_MAP={};SUB_FN_MAP={};
  (CHIP_DEFS[gameFormat]||[]).forEach(d=>{CHIP_FN_MAP[d.key]=d;});
  (SUB_DEFS[gameFormat]||[]).forEach(d=>{SUB_FN_MAP[d.key]=d;});
  // Category chips — only render if game has matching events
  const defs=(CHIP_DEFS[gameFormat]||[]).filter(d=>ALL.some(d.filter));
  let h=`<div class="chip on" data-c="All" onclick="setChip('All')">All</div>`;
  defs.forEach(d=>{h+=`<div class="chip" data-c="${d.key}" onclick="setChip('${d.key}')">${d.label}</div>`;});
  catEl.innerHTML=h;
  // Sub chips — only render if game has matching events
  const sdefs=(SUB_DEFS[gameFormat]||[]).filter(d=>ALL.some(d.filter));
  let sh='';sdefs.forEach(d=>{sh+=`<div class="chip" data-e="${d.key}" onclick="setSub('${d.key}')">${d.label}</div>`;});
  subEl.innerHTML=sh;
  subEl.style.display='none';
}

function setChip(key){
  activeCatKey=key;
  activeCatFn=key==='All'?null:(CHIP_FN_MAP[key]?.filter||null);
  activeSubFn=null;activeSubKey='';
  const isShots=key==='shots';
  document.querySelectorAll('[data-c]').forEach(x=>{
    const on=x.dataset.c===key;
    x.classList.toggle('on',on);
    if(on&&key!=='All'){
      const d=CHIP_FN_MAP[key];
      if(d){x.style.background=d.color;x.style.borderColor=d.color;x.style.color=d.dark?'#000':'#fff';}
    }else{x.style.background='';x.style.borderColor='';x.style.color='';}
  });
  document.querySelectorAll('[data-e]').forEach(x=>{x.classList.remove('on');x.style.background='';x.style.borderColor='';});
  const subEl=document.getElementById('subChips');
  if(subEl)subEl.style.display=(isShots&&subEl.children.length)?'':'none';
  applyF();

function statSide(e){ const t=(e.team||'').toUpperCase(); if(t===(GAME.homeTeam||'').toUpperCase())return 'h'; if(t===(GAME.awayTeam||'').toUpperCase())return 'a'; return null; }

let statPeriod='full';
function statQOf(e){ const m=/^([12])H\s+(\d+):/.exec(e.gameTime||''); if(!m)return null; const h=+m[1],min=+m[2]; return h===1?(min<18?'q1':'q2'):(min<18?'q3':'q4'); }
function statPred(e){
  switch(statPeriod){

// Marker style: circle = open play, square = dead ball; colour by result
// (1pt white / 2pt orange / goal yellow / other outcome red / penalty purple).
function locShotGlyph(e){
  const code=(e.code||'').toUpperCase();
  const out=String((e.labels||{})['Shot Outcomes']||e.outcome||'').toUpperCase();
  const all=(code+' '+out+' '+Object.values(e.labels||{}).join(' ')).toUpperCase();
  const shape=/DEADBALL|FREE|PENALTY|\b45\b|MARK/.test(code)?'square':'circle';
  let color='#c4c4c4';
  if(/PENALTY/.test(all)) color='#a855f7';
  else if(/GOAL/.test(out)) color='#ffd700';
  else if(/2 POINT/.test(out)) color='#f97316';
  else if(/1 POINT/.test(out)) color='#ffffff';
  else if(out) color='#ef4444';
  return {shape,color};
}

// Coordinates: native e.x/e.y first, else Match Tracker label pairs
// (X-Shot/Y-Shot, X-Shot_away, X-KOs, ...), 0-100 scale.
function dashCoordOf(e){
  if(e&&e.x!=null&&e.y!=null) return {x:e.x,y:e.y};
  const keys=Object.keys(e&&e.labels||{});
  for(const k of keys){
    const m=/^x([-_ ].*)$/i.exec(k); if(!m) continue;
    const yk=keys.find(k2=>/^y/i.test(k2)&&k2.slice(1).toLowerCase()===m[1].toLowerCase());
    if(!yk) continue;
    const x=parseFloat(e.labels[k]), y=parseFloat(e.labels[yk]);
    if(isFinite(x)&&isFinite(y)) return {x:Math.max(0,Math.min(100,x)),y:Math.max(0,Math.min(100,y))};
  }
  return null;
}

// Dashboard tag edits are BATCHED: each change updates the event in memory
// and a localStorage backup, then all changes push to the database in ONE
// authenticated call when the user leaves (the Save & leave prompt). Nothing
// is written per-keystroke. (Direct browser writes are blocked by RLS and
// fail silently anyway; batching goes through the service-role editEvent.)
let dashPending = new Map();               // rowId -> full event data to persist
function dashBackupKey(){ return 'coh_dash_'+gameId; }
function dashCleanEv(ev){ const d={...ev}; delete d._rowId; return d; }
function dashPersistBackup(){
  try{
    if(dashPending.size) localStorage.setItem(dashBackupKey(), JSON.stringify(Object.fromEntries(dashPending)));
    else localStorage.removeItem(dashBackupKey());
  }catch(_){}
}
function updateDashUnsaved(){
  const el=document.getElementById('dashUnsaved');
  const btn=document.getElementById('dashSaveBtn');
  const n=dashPending.size;
  if(el){ el.style.display = n ? '' : 'none'; el.style.color='var(--orange,#ff9800)'; el.textContent = n ? ('● '+n+' unsaved') : ''; }
  if(btn){ btn.style.display = n ? '' : 'none'; btn.disabled=false; btn.textContent='💾 Save ('+n+')'; }
}
function queueEventEdit(ev){ dashPending.set(ev._rowId, dashCleanEv(ev)); dashPersistBackup(); updateDashUnsaved(); }
async function saveAllDash(){
  if(!dashPending.size) return;
  const ops=[...dashPending.entries()].map(([id,data])=>({action:'update',id,data,ref:id}));
  const { results } = await cohesionEventBatch(ops);
  results.filter(r=>r.ok).forEach(r=>dashPending.delete(r.ref));
  const failed=results.filter(r=>!r.ok);
  dashPersistBackup(); updateDashUnsaved();
  if(failed.length) throw new Error(failed.length+' change(s) failed: '+failed.map(f=>f.error).join('; '));
}
// Explicit Save button — save deliberately without leaving the page. This is
// the reliable save path; the leave-prompt and localStorage backup remain
// as safety nets (and a hard refresh can only ever show the browser's own
// warning, never a custom dialog, so an explicit button is essential).
async function dashSaveNow(){
  if(!dashPending.size) return;
  const btn=document.getElementById('dashSaveBtn');
  if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
  try{ await saveAllDash(); }
  catch(e){ updateDashUnsaved(); alert('Some changes could not be saved: '+e.message); return; }
  updateDashUnsaved();
  const el=document.getElementById('dashUnsaved');
  if(el){ el.style.display=''; el.style.color='var(--green,#2a9d54)'; el.textContent='✓ Saved'; setTimeout(()=>updateDashUnsaved(),1600); }

// ── Add the current filter to a playlist ──────────────────────
// Turns every event in `filtered` into a clip (anchored to driveT, the main
// angle's video position; start/end carry only the duration) and appends
// them to a chosen playlist — the dashboard's "filter → watch" loop.
async function dashAuthFetchPL(payload){
  const ni=window.netlifyIdentity;
  const cu=ni&&((ni.gotrue&&ni.gotrue.currentUser&&ni.gotrue.currentUser())||(ni.currentUser&&ni.currentUser()));
  let t=cu&&cu.token&&cu.token.access_token;
  if(!t&&ni&&ni.refresh){ try{ await ni.refresh(); const u=ni.gotrue.currentUser(); t=u&&u.token&&u.token.access_token; }catch(_){} }
  if(!t) throw new Error('Not signed in as admin — sign out and back in, then retry.');
  const res=await fetch('/.netlify/functions/playlists',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify(payload)});
  const j=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(j.error||('HTTP '+res.status));
  return j;
}
function dashClipOf(e){
  // Capture from the angle the user is CURRENTLY watching: that angle's
  // video id, with times converted into its timeline. driveT (main-angle
  // reference) is kept on the clip so a future player can re-derive other
  // angles for the same moment.
  const idx=(GAME.angles&&GAME.angles[currentAngleIdx])?currentAngleIdx:0;
  const ang=(GAME.angles&&GAME.angles[idx])||null;
  const vid=(ang&&ang.youtubeId)||GAME.youtubeId||'';
  const s=Math.max(0,driveToAngle(e.driveT||0,idx));
  const dur=(e.end!=null&&e.start!=null)?Math.max(1,e.end-e.start):6;
  const clip={ videoId:vid, gameId:GAME.id, gameTitle:GAME.title||'', driveT:e.driveT||0,
           start:s, end:s+dur,
           label:(e.code||'Clip')+(e.player?' · '+e.player:''), code:e.code||'', player:e.player||'' };
  if(idx>0) clip.angle=(ang&&ang.label)||('Cam '+(idx+1));
  return clip;
}

async function dashRestoreBackup(){

  let bk; try{ bk=JSON.parse(raw); }catch(_){ try{localStorage.removeItem(dashBackupKey());}catch(__){} return; }

  if(!entries.length){ try{localStorage.removeItem(dashBackupKey());}catch(__){} return; }
  const c=await cohesionModal({title:'Unsaved changes found', message:'You have '+entries.length+' unsaved tag change(s) from a previous session on this game. Restore them?', buttons:[{label:'Restore',value:'restore',primary:true},{label:'Discard',value:'discard',danger:true}]});

  const hY=RT,aY=RT+RH+RG;
  ctx.fillStyle=dark?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.03)';
  ctx.fillRect(0,hY,W,RH);ctx.fillRect(0,aY,W,RH);
  ctx.fillStyle=dark?'rgba(255,255,255,0.22)':'rgba(0,0,0,0.28)';
  ctx.font='bold 8px sans-serif';
  ctx.fillText((GAME.homeTeam||'Home').toUpperCase().slice(0,3),2,hY+15);
  ctx.fillText((GAME.awayTeam||'Away').toUpperCase().slice(0,3),2,aY+15);
  const h1=GAME.half1Start||103,h2=GAME.half2Start||2289;
  // Period shading
  const h1x=Math.max(LW,xF(h1)),h2x=Math.max(LW,xF(h2));
  ctx.fillStyle=dark?'rgba(79,195,247,0.04)':'rgba(3,105,161,0.04)';
  ctx.fillRect(h1x,hY,Math.max(0,h2x-h1x),RH);ctx.fillRect(h1x,aY,Math.max(0,h2x-h1x),RH);
  ctx.fillStyle=dark?'rgba(79,195,247,0.07)':'rgba(3,105,161,0.07)';
  ctx.fillRect(h2x,hY,Math.max(0,W-h2x),RH);ctx.fillRect(h2x,aY,Math.max(0,W-h2x),RH);
  // Events
  const hC=GAME.homeColor||'#2563eb',aC=GAME.awayColor||'#22c55e';
  filtered.forEach(ev=>{
    const x=xF(ev.driveT),w=Math.max(3,((ev.end-ev.start)/vD)*W);
    if(x+w<LW||x>W)return;
    const iH=ev.team.toUpperCase()===(GAME.homeTeam||'').toUpperCase(),y=iH?hY:aY;
    ctx.fillStyle=ev.id===activeId?'#fff':(iH?hC:aC);
    ctx.globalAlpha=ev.id===activeId?1:0.82;
    const bx=Math.max(LW,x),bw=Math.max(1,Math.min(x+w,W)-bx);ctx.fillRect(bx,y+2,bw,RH-4);
    ctx.globalAlpha=1;
  });
  // Markers
  function mk(t,col,lbl,lw,dash){
    const x=xF(t);if(x<LW||x>W)return;
    ctx.strokeStyle=col;ctx.lineWidth=lw||1.5;
    ctx.setLineDash(dash||[]);
    ctx.beginPath();ctx.moveTo(x,RT);ctx.lineTo(x,RT+RH*2+RG);ctx.stroke();
    ctx.setLineDash([]);
    if(lbl){ctx.fillStyle=col;ctx.font='bold 9px sans-serif';ctx.fillText(lbl,x+2,RT+9);}
  }
  mk(h1,'rgba(56,189,248,0.9)','1H',2);
  mk(h2,'rgba(56,189,248,0.9)','2H',2);
  if(GAME.et1Start)mk(GAME.et1Start,'rgba(56,189,248,0.9)','Et1',2);
  if(GAME.et2Start)mk(GAME.et2Start,'rgba(56,189,248,0.9)','Et2',2);
  // Throw-ins (from raw ALL data - not filtered)
  ALL.filter(e=>e.code==='THROW-IN').forEach(ev=>{mk(ev.driveT,'rgba(192,132,252,0.6)',null,1,[2,3]);});
  // Time labels
  const LY=RT+RH*2+RG+13;
  const li=vD>3600?600:vD>1800?300:vD>900?120:60;
  const fl=Math.ceil(tlO/li)*li;
  ctx.fillStyle=dark?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.3)';
  ctx.font='9px sans-serif';
  for(let t=fl;t<vE;t+=li){
    const x=xF(t);
    if(x>LW+10&&x<W-10)ctx.fillText(fmt(t),x-10,LY);
  }
  // Playhead
  if(vidT>0){
    const px=xF(vidT);
    if(px>=LW&&px<=W){
      ctx.strokeStyle=dark?'rgba(255,255,255,0.88)':'rgba(0,0,0,0.65)';
      ctx.lineWidth=2;ctx.setLineDash([]);
      ctx.beginPath();ctx.moveTo(px,RT);ctx.lineTo(px,RT+RH*2+RG);ctx.stroke();
      ctx.fillStyle=dark?'rgba(255,255,255,0.88)':'rgba(0,0,0,0.65)';
      ctx.beginPath();ctx.moveTo(px-4,RT);ctx.lineTo(px+4,RT);ctx.lineTo(px,RT+7);ctx.fill();
    }
  }
}
function updatePH(t){
  vidT=t;
  const vD=tlDur/tlZ,pct=(t-tlO)/vD;
  if(pct>0.9){tlO=t-vD*0.8;tlO=Math.max(0,Math.min(tlDur-vD,tlO));}
  else if(pct<0.05&&tlO>0){tlO=Math.max(0,t-vD*0.15);}
  drawTL();
}
function tc(s){if(!s)return'';return s.toLowerCase().replace(/\b[a-z]/g,c=>c.toUpperCase());}
function fmt(s){s=Math.round(s);return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
// ── Auto fullscreen on landscape rotation (mobile only) ──────────
window.addEventListener('orientationchange',function(){
  setTimeout(function(){
    // Only trigger on portrait-width devices
    if(Math.min(screen.width,screen.height)>900)return;
    const isLand=window.innerWidth>window.innerHeight;
    const va=document.getElementById('VA');
    if(!va)return;
    if(isLand){
      const rfs=va.requestFullscreen||va.webkitRequestFullscreen||va.mozRequestFullScreen;
      if(rfs)rfs.call(va).catch(function(){});
    } else {
      const ef=document.exitFullscreen||document.webkitExitFullscreen;
      if(ef&&(document.fullscreenElement||document.webkitFullscreenElement))ef.call(document).catch(function(){});
    }
  },250);
});
loadGame();
</script>
<div id="tlTip">
  <div class="tlt-code" id="tltCode"></div>
  <div class="tlt-detail" id="tltDetail"></div>
  <div class="tlt-time" id="tltTime"></div>
</div>
