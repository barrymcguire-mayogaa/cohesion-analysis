<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COHESION — Game Library</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{
  --bg:#181820;--panel:#1e1e28;--card:#252530;--hover:#2c2c3a;
  --border:rgba(255,255,255,0.08);--t1:#f0f0f5;--t2:#8888a0;--t3:#52526a;
  --accent:#4fc3f7;--accent-bg:rgba(79,195,247,0.12);--gold:#ffd700;
  --shadow:rgba(0,0,0,0.4);--mayo:#006747;--london:#003087;
  --logo-color:#ffffff;
}
[data-theme="light"]{
  --bg:#f0eeeb;--panel:#ffffff;--card:#f7f6f3;--hover:#ebe9e5;
  --border:rgba(0,0,0,0.1);--t1:#1a1a28;--t2:#555572;--t3:#888899;
  --accent:#0369a1;--accent-bg:rgba(3,105,161,0.08);--gold:#b45309;
  --shadow:rgba(0,0,0,0.12);--mayo:#006747;--london:#003087;
  --logo-color:#1a1a28;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;transition:background .2s,color .2s;}

/* HEADER */
header{
  height:56px;background:var(--panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:16px;
  position:sticky;top:0;z-index:50;
}
.logo{
  font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:22px;letter-spacing:4px;color:var(--logo-color);text-decoration:none;
}
.logo span{color:var(--logo-color);}
.logo-sub{
  font-family:'Barlow Condensed',sans-serif;font-weight:700;
  font-size:11px;letter-spacing:3px;color:var(--logo-color);
  text-transform:uppercase;margin-left:2px;
}
.hdr-spacer{flex:1;}
.hdr-btn{
  display:flex;align-items:center;gap:5px;padding:6px 12px;
  border-radius:7px;font:700 11px 'Barlow Condensed',sans-serif;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--t2);
  text-decoration:none;transition:all .15s;
}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
.hdr-btn-admin{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.hdr-btn-admin:hover{background:var(--accent);color:#fff;}
.theme-btn{width:36px;height:36px;border-radius:50%;justify-content:center;font-size:16px;padding:0;}

/* FILTERS */
.filter-bar{
  padding:16px 20px 12px;background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.filter-label{
  font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:2px;
  color:var(--t3);text-transform:uppercase;margin-right:4px;
}
select{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:6px 10px;color:var(--t1);font:12px 'Barlow',sans-serif;
  outline:none;cursor:pointer;transition:border-color .15s;
}
select:focus{border-color:var(--accent);}
select option{background:var(--card);}
.search-inp{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:6px 12px;color:var(--t1);font:12px 'Barlow',sans-serif;
  outline:none;transition:border-color .15s;min-width:180px;
}
.search-inp::placeholder{color:var(--t3);}
.search-inp:focus{border-color:var(--accent);}
.filter-count{
  margin-left:auto;font:600 12px 'Barlow Condensed',sans-serif;
  color:var(--t3);letter-spacing:.5px;
}

/* GRID */
.grid-wrap{padding:24px 20px;max-width:1400px;margin:0 auto;}
.section-header{
  font:700 13px 'Barlow Condensed',sans-serif;letter-spacing:2px;
  text-transform:uppercase;color:var(--t3);margin-bottom:14px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.section-header span{color:var(--t2);}
.game-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;margin-bottom:32px;
}
.game-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:all .2s;text-decoration:none;
  display:flex;flex-direction:column;
}
.game-card:hover{
  border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 8px 24px var(--shadow);
}
.card-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#000;}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.game-card:hover .card-thumb img{transform:scale(1.03);}
.card-thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.1) 60%);
  display:flex;align-items:flex-end;padding:10px 12px;
  justify-content:space-between;
}
.card-angles{
  font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:1px;
  color:rgba(255,255,255,0.9);background:rgba(0,0,0,0.55);
  padding:3px 7px;border-radius:4px;display:flex;align-items:center;gap:4px;
  flex-shrink:0;
}
.card-competition{
  font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:1.5px;
  text-transform:uppercase;color:rgba(255,255,255,0.8);
  background:rgba(0,0,0,0.5);padding:3px 7px;border-radius:4px;
}
.card-body{padding:14px;}
.card-teams{
  font:800 18px 'Barlow Condensed',sans-serif;letter-spacing:.5px;
  color:var(--t1);margin-bottom:6px;
}
.card-teams .vs{color:var(--t3);font-weight:400;font-size:14px;margin:0 4px;}
.card-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.card-date{font-size:12px;color:var(--t2);}
.card-round{
  font:600 10px 'Barlow Condensed',sans-serif;letter-spacing:1px;
  color:var(--accent);text-transform:uppercase;
}
.card-events{
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
  font:600 11px 'Barlow Condensed',sans-serif;letter-spacing:.5px;
  color:var(--t3);
}
.card-events b{color:var(--t2);}

/* DELETE BUTTON */
.card-del{
  position:absolute;top:8px;right:8px;z-index:2;
  width:28px;height:28px;border-radius:50%;
  background:rgba(220,38,38,0.82);backdrop-filter:blur(4px);
  border:1.5px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:15px;line-height:1;cursor:pointer;
  opacity:0;transition:opacity .15s,background .15s,transform .1s;
}
.game-card:hover .card-del{opacity:1;}
.card-del:hover{background:#dc2626;transform:scale(1.1);}

/* THREE-DOT EDIT BUTTON */
.card-edit{
  position:absolute;top:8px;left:8px;z-index:2;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);
  border:1.5px solid rgba(255,255,255,0.25);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:17px;line-height:1;cursor:pointer;
  opacity:0;transition:opacity .15s,background .15s,transform .1s;
}
.game-card:hover .card-edit{opacity:1;}
.card-edit:hover{background:rgba(255,255,255,0.18);transform:scale(1.1);}

/* MODAL WARNING LINE */
.modal-warn{
  font-size:12px;font-weight:600;color:#f87171;
  margin-bottom:18px;padding:8px 12px;
  background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.25);
  border-radius:7px;line-height:1.5;
}

/* EDIT MODAL FIELDS */
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.edit-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.edit-field.half{margin-bottom:0;}
.edit-field label{font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;}
.edit-field input[type=text],.edit-field input[type=date],.edit-field select{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:8px 11px;color:var(--t1);font:13px 'Barlow',sans-serif;outline:none;
  transition:border-color .2s;width:100%;cursor:pointer;
}
.edit-field input:focus,.edit-field select:focus{border-color:var(--accent);}
.edit-field select option{background:var(--card);}
.color-inp-row{display:flex;align-items:center;gap:8px;}
.color-inp-row input[type=color]{width:38px;height:34px;padding:2px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;flex-shrink:0;}
.mbtn-save{border:none;background:var(--accent);color:#fff;}
.mbtn-save:hover{opacity:.9;}

/* CONFIRM MODAL */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;transition:opacity .18s;
}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:28px 28px 24px;max-width:380px;width:calc(100% - 40px);
  box-shadow:0 24px 64px rgba(0,0,0,0.55);
  transform:translateY(8px);transition:transform .18s;
}
.modal-bg.show .modal{transform:translateY(0);}
.modal-icon{font-size:28px;margin-bottom:12px;}
.modal-title{font:800 18px 'Barlow Condensed',sans-serif;letter-spacing:.5px;margin-bottom:8px;}
.modal-body{font-size:13px;color:var(--t2);margin-bottom:8px;line-height:1.6;}
.modal-body strong{color:var(--t1);}
.modal-note{font-size:11px;color:var(--t3);margin-bottom:22px;line-height:1.6;}
.modal-note code{background:var(--card);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;color:var(--accent);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{padding:8px 18px;border-radius:7px;font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:.6px;cursor:pointer;transition:all .15s;}
.mbtn-cancel{border:1px solid var(--border);background:var(--card);color:var(--t2);}
.mbtn-cancel:hover{border-color:var(--t2);color:var(--t1);}
.mbtn-delete{border:none;background:#dc2626;color:#fff;}
.mbtn-delete:hover{background:#b91c1c;}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel);border:1px solid var(--border);border-radius:9px;
  padding:10px 18px;font:600 12px 'Barlow Condensed',sans-serif;letter-spacing:.4px;
  color:var(--t1);box-shadow:0 8px 24px rgba(0,0,0,0.35);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:300;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ANGLES SECTION (edit modal) */
.angles-section{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.angles-hdr{display:flex;align-items:center;margin-bottom:10px;}
.angles-title{font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;}
.angle-row{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;}
.angle-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.angle-cam-lbl{font:700 11px 'Barlow Condensed',sans-serif;color:var(--t2);}
.angle-rm{width:22px;height:22px;border-radius:50%;background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.3);color:#f87171;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;flex-shrink:0;}
.angle-rm:hover{background:#dc2626;color:#fff;}
.angle-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.angle-field{display:flex;flex-direction:column;gap:4px;}
.angle-field label{font:700 9px 'Barlow Condensed',sans-serif;letter-spacing:1px;color:var(--t3);text-transform:uppercase;}
.angle-field input{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--t1);font:12px 'Barlow',sans-serif;outline:none;transition:border-color .2s;width:100%;}
.angle-field input:focus{border-color:var(--accent);}
.angle-field.afull{grid-column:1/-1;}
.angle-add{width:100%;padding:7px;border-radius:7px;background:var(--card);border:1px dashed var(--border);color:var(--t3);font:600 10px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;transition:all .15s;margin-top:2px;}
.angle-add:hover{border-color:var(--accent);color:var(--accent);}
.angle-empty{font-size:11px;color:var(--t3);margin-bottom:8px;padding:4px 0;}

/* EMPTY */
.empty-state{
  text-align:center;padding:60px 20px;color:var(--t3);
}
.empty-state h3{font-size:18px;color:var(--t2);margin-bottom:8px;}
.empty-state p{font-size:13px;}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--t3);}
.spinner{
  width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<!-- Delete confirmation modal -->
<div class="modal-bg" id="delModal">

    <div class="edit-row">
      <div class="edit-field half">
        <label>Competition</label>
        <select id="eCompetition">
          <option>FBD League</option>
          <option>National Football League</option>
          <option>Connacht SFC</option>
          <option>All-Ireland SFC</option>

      <div class="edit-field half">

    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="mbtn mbtn-save" onclick="confirmEdit()">💾 Save</button>
    </div>
  </div>
</div>

// ── Theme ─────────────────────────────────────────────────────
function initTheme(){
  const t = localStorage.getItem('cohesion_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeToggle').textContent = t==='dark'?'☀️':'🌙';
}
function toggleTheme(){
  const c = document.documentElement.getAttribute('data-theme');
  const n = c==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('cohesion_theme', n);
  document.getElementById('themeToggle').textContent = n==='dark'?'☀️':'🌙';
}

// ── Data ──────────────────────────────────────────────────────
let allGames = [];

function formatDate(d){
  if(!d) return '';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IE',{day:'numeric',month:'short',year:'numeric'});
}

// ── SAFE DATE HELPER (prevents crashes from malformed dates) ──
function getYearFromDate(dateValue) {
  if (!dateValue) return '';
  if (typeof dateValue === 'string') {
    // Handle YYYY-MM-DD or other string formats
    const match = dateValue.match(/^(\d{4})/);
    return match ? match[1] : '';
  }
  if (dateValue instanceof Date) {
    return dateValue.getFullYear().toString();
  }
  // If it's a number (Excel serial), try to convert
  if (typeof dateValue === 'number') {
    try {
      const d = new Date((dateValue - 25569) * 86400 * 1000); // Excel epoch
      return d.getFullYear().toString();
    } catch (e) {
      return '';
    }
  }
  return '';
}

function buildTeamFilter(games){
  try {
    const teams = new Set();
    games.forEach(g=>{
      if(g && g.homeTeam) teams.add(g.homeTeam);
      if(g && g.awayTeam) teams.add(g.awayTeam);
    });
    const sel = document.getElementById('fTeam');
    if (sel) {
      [...teams].sort().forEach(t=>{
        const o = document.createElement('option');
        o.value = t; o.textContent = t; sel.appendChild(o);
      });
    }
  } catch (e) {
    console.error('buildTeamFilter error:', e);
  }
}
function buildYearFilter(games){
  try {
    const years = new Set(
      games
        .map(g => {
          if (!g || !g.date) return null;
          return getYearFromDate(g.date);
        })
        .filter(y => y && y.length > 0)
    );
    const sel = document.getElementById('fYear');
    [...years].sort().reverse().forEach(y=>{
      const o = document.createElement('option');
      o.value = y; o.textContent = y; sel.appendChild(o);
    });
  } catch (e) {
    console.error('buildYearFilter error:', e);
  }
}

function toggleDivFilter(){
  const comp = document.getElementById('fComp').value;
  const divSel = document.getElementById('fDiv');
  const show = comp === 'National Football League';
  divSel.style.display = show ? '' : 'none';
  if(!show) divSel.value = '';
  toggleRoundFilter();
}

function toggleRoundFilter(){
  const comp = document.getElementById('fComp').value;
  const div = document.getElementById('fDiv').value;
  const roundSel = document.getElementById('fRound');
  const show = comp === 'National Football League' && div;
  roundSel.style.display = show ? '' : 'none';
  if(!show) roundSel.value = '';
}

function applyFilters(){
  const comp   = document.getElementById('fComp').value;
  const div    = document.getElementById('fDiv').value;
  const round  = document.getElementById('fRound').value;
  const team   = document.getElementById('fTeam').value;
  const year   = document.getElementById('fYear').value;
  const search = document.getElementById('fSearch').value.toLowerCase();

  const filtered = allGames.filter(g=>{
    if(!g) return false;
    if(comp && g.competition !== comp) return false;
    if(div && g.division !== div) return false;
    if(round && g.round !== round) return false;
    if(team && g.homeTeam !== team && g.awayTeam !== team) return false;
    if(year && getYearFromDate(g.date) !== year) return false;
    if(search && ![g.title||'',g.competition||'',g.homeTeam||'',g.awayTeam||'',g.round||'']
        .join(' ').toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('filterCount').textContent =
    `${filtered.length} game${filtered.length!==1?'s':''}`;

  renderGames(filtered);
}

function renderGames(games){
  const wrap = document.getElementById('gridWrap');
  if(!games || !games.length){
    wrap.innerHTML = `<div class="empty-state"><h3>No games found</h3><p>Try adjusting your filters</p></div>`;
    return;
  }

  try {
    // Group by competition + year
    const groups = {};
    games.forEach(g=>{
      if (!g) return; // Skip null games
      const year = getYearFromDate(g.date || '');
      const competition = g.competition || 'Unknown';
      const key  = `${year} ${competition}`;
      if(!groups[key]) groups[key] = {label:`${competition} ${year}`, games:[]};
      groups[key].games.push(g);
    });

    // Sort games within each group newest first
    Object.values(groups).forEach(grp=>{
      grp.games.sort((a,b)=>{
        const dateA = (a && a.date) || '';
        const dateB = (b && b.date) || '';
        return dateB > dateA ? 1 : dateB < dateA ? -1 : 0;
      });
    });

    // Sort groups by the most recent game date in each group (newest group first)
    const sortedKeys = Object.keys(groups).sort((a,b)=>{
      const dA = (groups[a].games[0] && groups[a].games[0].date) || '';
      const dB = (groups[b].games[0] && groups[b].games[0].date) || '';
      return dB>dA?1:dB<dA?-1:0;
    });

    wrap.innerHTML = sortedKeys.map(k=>{
      const grp = groups[k];
      const cards = grp.games.map(g=>{
        if (!g) return '';
        const home = g.homeTeam || 'Unknown';
        const away = g.awayTeam || 'Unknown';
        const title = g.title || `${home} v ${away}`;
        const comp = g.competition || '—';
        const thumbUrl = g.thumbnail || `https://img.youtube.com/vi/${g.youtubeId}/hqdefault.jpg`;
        const ytId = g.youtubeId || '';
        return `
        <a class="game-card" href="dashboard.html?game=${g.id}">
          <div class="card-thumb">
            <img src="${thumbUrl}" alt="${title}"
                 onerror="this.src='https://img.youtube.com/vi/${ytId}/hqdefault.jpg'">
            <div class="card-thumb-overlay">
              <div class="card-competition">${comp}</div>
              ${g.angles&&g.angles.length>1?`<div class="card-angles">📹 ${g.angles.length}</div>`:''}
            </div>
            ${auth==='admin'?`<button class="card-edit" title="Edit game details" onclick="startEdit('${g.id}',event)">⋯</button>`:''}
            ${auth==='admin'?`<button class="card-del" title="Remove game" onclick="startDelete('${g.id}',event)">✕</button>`:''}
          </div>
          <div class="card-body">
            <div class="card-teams">
              ${home} <span class="vs">v</span> ${away}
            </div>
            <div class="card-meta">
              <div class="card-date">${formatDate(g.date)}</div>
              ${g.round?`<div class="card-round">${g.round}</div>`:''}
            </div>
            <div class="card-events"><b>${g.eventCount||'—'}</b> coded events</div>
          </div>
        </a>`;
      }).join('');
      return `
        <div class="section-header">${grp.label} <span>· ${grp.games.length} game${grp.games.length!==1?'s':''}</span></div>
        <div class="game-grid">${cards}</div>`;
    }).join('');
  } catch (e) {
    console.error('renderGames error:', e);
    wrap.innerHTML = `<div class="empty-state"><h3>Error rendering games</h3><p>${e.message}</p></div>`;
  }
}

// ── Delete / Modal / Toast ────────────────────────────────────
let pendingDeleteId = null;

function startDelete(id, e){
  e.preventDefault();
  e.stopPropagation();
  const g = allGames.find(x=>x.id===id);
  if(!g) return;
  pendingDeleteId = id;
  const home = g.homeTeam || 'Unknown';
  const away = g.awayTeam || 'Unknown';
  const year = getYearFromDate(g.date) || '—';
  document.getElementById('delGameName').textContent = `${home} v ${away} (${year})`;
  document.getElementById('delModal').classList.add('show');
}
function closeModal(){
  document.getElementById('delModal').classList.remove('show');
  pendingDeleteId = null;
}
async function confirmDelete(){
  if(!pendingDeleteId) return;
  try{
    const { error } = await _sb.from('games').delete().eq('id', pendingDeleteId);
    if(error) throw error;
    allGames = allGames.filter(g=>g.id!==pendingDeleteId);
    closeModal();
    const fTeam=document.getElementById('fTeam'),fYear=document.getElementById('fYear');
    fTeam.innerHTML='<option value="">All Teams</option>';
    fYear.innerHTML='<option value="">All Years</option>';
    buildTeamFilter(allGames);
    buildYearFilter(allGames);
    applyFilters();
    showToast('Game removed successfully.');
  } catch(e){
    showToast('Error removing game: ' + e.message);
  }
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4500);
}
// Close modal on backdrop click
document.getElementById('delModal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});
document.getElementById('editModal').addEventListener('click',function(e){
  if(e.target===this)closeEditModal();
});
// Close modals on Escape
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeEditModal();}});

// ── Edit / Modal ──────────────────────────────────────────────
let pendingEditId = null;
let editAngles = []; // alternate angles only (index 1+ from g.angles)

function parseTimeVal(str){
  if(!str||!str.trim())return null;
  const neg=str.trim().startsWith('-');
  const parts=str.trim().replace(/^-/,'').split(':');
  if(parts.length!==2)return null;
  const m=parseInt(parts[0]),s=parseInt(parts[1]);
  if(isNaN(m)||isNaN(s))return null;
  return (neg?-1:1)*(m*60+s);
}
function fmtTimeVal(secs){
  if(secs===null||secs===undefined)return'';
  const neg=secs<0,abs=Math.abs(Math.round(secs));
  return(neg?'-':'')+String(Math.floor(abs/60)).padStart(2,'0')+':'+String(abs%60).padStart(2,'0');
}
function extractYtIdOrRaw(val){
  const m=(val||'').match(/(?:youtu\.be\/|v=|embed\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:val.trim();
}
function renderEditAngles(){
  const list=document.getElementById('eAnglesList');if(!list)return;
  if(!editAngles.length){
    list.innerHTML='<div class="angle-empty">No additional angles. Click below to add one.</div>';
    return;
  }
  list.innerHTML=editAngles.map((a,i)=>`
    <div class="angle-row">
      <div class="angle-row-top">
        <div class="angle-cam-lbl">Angle ${i+2}</div>
        <div class="angle-rm" onclick="removeEditAngle(${i})">✕</div>
      </div>
      <div class="angle-fields">
        <div class="angle-field">
          <label>Label</label>
          <input type="text" value="${(a.label||'').replace(/"/g,'&quot;')}" placeholder="e.g. Behind Goals" oninput="editAngles[${i}].label=this.value">
        </div>
        <div class="angle-field">
          <label>YouTube ID or URL</label>
          <input type="text" value="${(a.youtubeId||'').replace(/"/g,'&quot;')}" placeholder="Video ID or full URL" oninput="editAngles[${i}].youtubeId=extractYtIdOrRaw(this.value)">
        </div>
        <div class="angle-field">
          <label>1st Half Start (MM:SS)</label>
          <input type="text" value="${fmtTimeVal(a.half1Start)}" placeholder="01:43" maxlength="6" oninput="editAngles[${i}].half1Start=parseTimeVal(this.value)">
        </div>
        <div class="angle-field">
          <label>2nd Half Start (MM:SS)</label>
          <input type="text" value="${fmtTimeVal(a.half2Start)}" placeholder="38:09" maxlength="6" oninput="editAngles[${i}].half2Start=parseTimeVal(this.value)">
        </div>
      </div>
    </div>`).join('');
}
function addEditAngle(){
  editAngles.push({label:'',youtubeId:'',half1Start:null,half2Start:null,et1Start:null,et2Start:null});
  renderEditAngles();
}
function removeEditAngle(i){
  editAngles.splice(i,1);
  renderEditAngles();
}

function startEdit(id, e){
  e.preventDefault();
  e.stopPropagation();
  const g = allGames.find(x=>x.id===id);
  if(!g) return;
  pendingEditId = id;
  document.getElementById('eHomeTeam').value    = g.homeTeam    || '';
  document.getElementById('eAwayTeam').value    = g.awayTeam    || '';
  document.getElementById('eHomeColor').value   = g.homeColor   || '#000000';
  document.getElementById('eHomeHex').value     = g.homeColor   || '#000000';
  document.getElementById('eAwayColor').value   = g.awayColor   || '#000000';
  document.getElementById('eAwayHex').value     = g.awayColor   || '#000000';
  document.getElementById('eCompetition').value = g.competition || '';
  document.getElementById('eRound').value       = g.round       || '';
  document.getElementById('eDate').value        = g.date        || '';
  // Populate alternate angles (index 1+)
  editAngles = g.angles&&g.angles.length>1 ? g.angles.slice(1).map(a=>({...a})) : [];
  renderEditAngles();
  document.getElementById('editModal').classList.add('show');
}
function closeEditModal(){
  document.getElementById('editModal').classList.remove('show');
  pendingEditId = null;
}
function syncEC(side, hex){
  if(/^#[0-9a-fA-F]{6}$/.test(hex.trim()))
    document.getElementById(side==='home'?'eHomeColor':'eAwayColor').value = hex.trim();
}
async function confirmEdit(){
  if(!pendingEditId) return;
  const g = allGames.find(x=>x.id===pendingEditId);
  if(!g) return;
  const homeTeam = document.getElementById('eHomeTeam').value.trim();
  const awayTeam = document.getElementById('eAwayTeam').value.trim();
  if(!homeTeam||!awayTeam){ alert('Please enter both team names.'); return; }
  g.homeTeam    = homeTeam;
  g.awayTeam    = awayTeam;
  g.homeColor   = document.getElementById('eHomeColor').value;
  g.awayColor   = document.getElementById('eAwayColor').value;
  g.competition = document.getElementById('eCompetition').value;
  g.round       = document.getElementById('eRound').value.trim();
  g.date        = document.getElementById('eDate').value;
  g.title       = `${homeTeam} v ${awayTeam}`;
  const validAlts = editAngles.filter(a=>a.youtubeId&&a.youtubeId.trim());
  if(validAlts.length>0){
    const mainAngle = g.angles&&g.angles.length>0
      ? g.angles[0]
      : {label:'Main',youtubeId:g.youtubeId,half1Start:g.half1Start||0,half2Start:g.half2Start||0,et1Start:g.et1Start||null,et2Start:g.et2Start||null};
    g.angles = [mainAngle, ...validAlts];
  } else {
    if(g.angles&&g.angles.length<=1) delete g.angles;
  }
  try{
    const { error } = await _sb.from('games').update({ meta: g }).eq('id', pendingEditId);
    if(error) throw error;
    closeEditModal();
    const fTeam=document.getElementById('fTeam'),fYear=document.getElementById('fYear');
    fTeam.innerHTML='<option value="">All Teams</option>';
    fYear.innerHTML='<option value="">All Years</option>';
    buildTeamFilter(allGames);
    buildYearFilter(allGames);
    applyFilters();
    showToast('Game updated successfully.');
  } catch(e){
    showToast('Error saving changes: ' + e.message);
  }
}

async function loadGames(){
  try{
    const { data, error } = await _sb.from('games').select('id, meta').order('created_at', { ascending: false });
    if(error) throw error;

    // Parse meta: handle both JSON string and object formats
    // (Supabase may return JSON as string depending on column type)
    allGames = (data || [])
      .map(r => {
        let meta = r.meta;
        // If meta is a JSON string, parse it
        if (typeof meta === 'string') {
          try {
            meta = JSON.parse(meta);
          } catch (e) {
            console.warn('Failed to parse meta for game:', r.id, e);
            return null;
          }
        }
        return meta;
      })
      .filter(g => g && typeof g === 'object');

    // Add defensive console logging for debugging
    console.log(`Loaded ${allGames.length} games from database`);
    if (allGames.length === 0) {
      console.warn('No games found after filtering. Raw data:', data);
    }

    buildTeamFilter(allGames);
    buildYearFilter(allGames);
    applyFilters();
  } catch(e){
    console.error('loadGames error:', e);
    document.getElementById('gridWrap').innerHTML =
      `<div class="empty-state"><h3>Could not load games</h3><p>${e.message}</p></div>`;
  }
}

loadGames();
</script>
