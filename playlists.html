<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COHESION — Playlists</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{
  --bg:#181820;--panel:#1e1e28;--card:#252530;--hover:#2c2c3a;
  --border:rgba(255,255,255,0.08);--t1:#f0f0f5;--t2:#8888a0;--t3:#52526a;
  --accent:#4fc3f7;--accent-bg:rgba(79,195,247,0.12);--shadow:rgba(0,0,0,0.4);
  --green:#4caf50;--green-bg:rgba(76,175,80,0.12);
  --red:#f44336;--red-bg:rgba(244,67,54,0.12);--orange:#ff9800;--logo-color:#ffffff;
}
[data-theme="light"]{
  --bg:#f0eeeb;--panel:#ffffff;--card:#f7f6f3;--hover:#ebe9e5;
  --border:rgba(0,0,0,0.1);--t1:#1a1a28;--t2:#555572;--t3:#888899;
  --accent:#0369a1;--accent-bg:rgba(3,105,161,0.08);--shadow:rgba(0,0,0,0.12);
  --green:#15803d;--green-bg:rgba(21,128,61,0.1);--logo-color:#1a1a28;
  --red:#b91c1c;--red-bg:rgba(185,28,28,0.1);--orange:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;}
header{height:54px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:4px;color:var(--logo-color);text-decoration:none;}
.tag{font:800 10px 'Barlow Condensed',sans-serif;letter-spacing:2px;color:var(--accent);border:1px solid var(--accent);border-radius:5px;padding:2px 7px;}
.hdr-s{flex:1;}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:var(--t2);border:1px solid var(--border);background:var(--card);text-decoration:none;cursor:pointer;}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
.page{padding:16px;max-width:1500px;margin:0 auto;}
.title{font:800 24px 'Barlow Condensed',sans-serif;letter-spacing:1px;}
.sub{font-size:12px;color:var(--t2);margin-bottom:14px;}

.grid{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start;}
@media(max-width:900px){.grid{grid-template-columns:1fr;}}

/* playlist list */
.pl-list{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.pl-list .hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:1px;color:var(--t3);text-transform:uppercase;}
.pl-list .hd .newbtn{margin-left:auto;padding:4px 10px;border-radius:6px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);font:700 11px 'Barlow Condensed',sans-serif;cursor:pointer;}
.pl-row{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;}
.pl-row:hover{background:var(--hover);}
.pl-row.on{background:var(--accent-bg);border-left:3px solid var(--accent);padding-left:9px;}
.pl-row .nm{font:700 14px 'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.pl-row .mt{font-size:11px;color:var(--t3);}
.pl-empty{padding:18px 12px;color:var(--t3);font-size:12px;line-height:1.5;}
.pl-thumb{width:42px;height:42px;border-radius:8px;flex:none;object-fit:cover;background:var(--card);}
.pl-thumb.ph{display:flex;align-items:center;justify-content:center;font:800 15px 'Barlow Condensed',sans-serif;color:#fff;}
.pl-rowin{display:flex;gap:10px;align-items:center;}

/* player + clips */
.stage{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.stage .vid{width:100%;height:440px;background:#000;position:relative;}
.stage .vid iframe{width:100%;height:100%;border:none;}
.vbar{display:flex;gap:6px;align-items:center;padding:8px 10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.vbtn{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--t1);font:700 12px 'Barlow Condensed',sans-serif;padding:8px 13px;cursor:pointer;}
.vbtn:hover{border-color:var(--accent);color:var(--accent);}
.vbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.nowp{font:600 12px 'Barlow',sans-serif;color:var(--t2);flex:1;min-width:160px;}
.angbtn{padding:5px 9px;border-radius:6px;font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);}
.angbtn:hover{border-color:var(--accent);color:var(--accent);}
.angbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.clips{margin-top:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.clips .hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.clips .hd .pname{font:800 17px 'Barlow Condensed',sans-serif;letter-spacing:.5px;flex:1;}
.clips .hd input{background:var(--card);border:1px solid var(--accent);border-radius:6px;padding:6px 9px;color:var(--t1);font:700 15px 'Barlow Condensed',sans-serif;flex:1;outline:none;}
.clip{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:grab;}
.clip:hover{background:var(--hover);}
.clip.on{background:var(--accent-bg);}
.clip.dragover{border-top:2px solid var(--accent);}
.clip .idx{font:700 11px 'Barlow Condensed',sans-serif;color:var(--t3);min-width:20px;text-align:right;}
.clip .grip{color:var(--t3);cursor:grab;font-size:13px;flex:none;}
.clip .lbl{font:600 14px 'Barlow',sans-serif;flex:1;min-width:120px;cursor:text;}
.clip .lbl:hover{color:var(--accent);}
.clip .lbl input{width:100%;background:var(--card);border:1px solid var(--accent);border-radius:6px;padding:5px 8px;color:var(--t1);font:600 14px 'Barlow',sans-serif;outline:none;}
.clip .lblwrap{flex:1;min-width:120px;}
.clip .nt{font-size:11.5px;color:var(--t1);margin-top:2px;line-height:1.4;}
.clip .nt.ghost{color:var(--t3);font-style:italic;cursor:pointer;}
.clip .nt.ghost:hover{color:var(--accent);}
.clip .nt input{width:100%;background:var(--card);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;color:var(--t1);font:400 12px 'Barlow',sans-serif;outline:none;}
/* present mode (fullscreen) */
.stage:fullscreen{display:flex;flex-direction:column;background:#000;border:none;border-radius:0;}
.stage:fullscreen .vid{flex:1;height:auto !important;}
.stage:fullscreen .vbar{background:rgba(10,10,16,.92);border-top:1px solid rgba(255,255,255,.1);}
.presover{display:none;}
.stage:fullscreen .presover{display:block;position:absolute;left:0;right:0;bottom:64px;padding:14px 26px;background:linear-gradient(transparent,rgba(0,0,0,.78));pointer-events:none;}
.presover .po-lbl{font:800 26px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.presover .po-note{font:400 16px 'Barlow',sans-serif;color:rgba(255,255,255,.85);margin-top:4px;max-width:900px;line-height:1.5;text-shadow:0 1px 6px rgba(0,0,0,.8);}
.presover .po-idx{font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:1px;color:rgba(255,255,255,.55);margin-bottom:4px;}
.clip .meta{font-size:11px;color:var(--t3);white-space:nowrap;}
.clip .cbt{background:none;border:1px solid var(--border);border-radius:6px;color:var(--t2);font-size:11px;padding:4px 8px;cursor:pointer;flex:none;}
.clip .cbt:hover{border-color:var(--accent);color:var(--accent);}
.clip .cbt.x:hover{border-color:var(--red);color:var(--red);}
.savebar{padding:10px 12px;display:flex;gap:8px;align-items:center;}
.savebtn{padding:9px 16px;border-radius:8px;border:1px solid var(--green);background:var(--green);color:#fff;font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;}
.delbtn{padding:9px 14px;border-radius:8px;border:1px solid var(--red);background:none;color:var(--red);font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;margin-left:auto;}
.status{font-size:12px;color:var(--t2);min-height:16px;}
.empty-stage{padding:60px 20px;text-align:center;color:var(--t3);font-size:13px;line-height:1.7;}
/* browse grid (library-style) */
.pltools{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.plsearch{flex:1;min-width:220px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--t1);font:13px 'Barlow',sans-serif;outline:none;}
.plsearch:focus{border-color:var(--accent);}
.newbtn{padding:9px 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;}
.newbtn:hover{background:var(--accent);color:#fff;}
.plgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.plcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .18s;}
.plcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow);}
.plcard .art{aspect-ratio:1/1;width:100%;object-fit:cover;display:block;background:var(--card);}
.plcard .art.ph{display:flex;align-items:center;justify-content:center;font:800 44px 'Barlow Condensed',sans-serif;color:#fff;}
.plcard .bd{padding:11px 12px;}
.plcard .nm{font:800 15px 'Barlow Condensed',sans-serif;letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.plcard .mt{font-size:11px;color:var(--t3);margin-top:2px;display:flex;gap:6px;align-items:center;}
.scopebadge{font:700 9px 'Barlow Condensed',sans-serif;letter-spacing:.5px;border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--t2);}
.pl-empty{padding:40px 12px;color:var(--t3);font-size:13px;text-align:center;line-height:1.7;grid-column:1/-1;}

/* player view: sidebar left, video right */
.ptop{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.ptop .pname{font:800 20px 'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.ptop .pname.rn{cursor:pointer;}
.ptop .pname.rn:hover{color:var(--accent);}
.backbtn{padding:8px 13px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;}
.backbtn:hover{border-color:var(--accent);color:var(--accent);}
.pview{display:grid;grid-template-columns:310px 1fr;gap:14px;align-items:start;}
.side{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow-y:auto;max-height:calc(100vh - 150px);position:sticky;top:66px;}
.clip{cursor:pointer;}
.clip .smeta{font-size:10.5px;color:var(--t3);margin-top:1px;}
.npbar{margin-top:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.npbar .npt{font:800 15px 'Barlow Condensed',sans-serif;letter-spacing:.5px;flex:1;min-width:180px;}
.npbar .npn{width:100%;font-size:13px;color:var(--t2);line-height:1.55;}
.npbar .npn:empty{display:none;}
.szbtn{padding:4px 9px;border-radius:5px;font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);}
.szbtn:hover{border-color:var(--accent);color:var(--accent);}
.szbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.pldh{height:11px;margin-top:6px;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:ns-resize;display:flex;align-items:center;justify-content:center;}
.pldh::before{content:'';width:34px;height:3px;border-radius:2px;background:var(--t3);}
.pldh:hover::before,.pldh.act::before{background:var(--accent);}
.cmwrap{margin-top:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.cmhd{font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:1px;color:var(--t3);text-transform:uppercase;margin-bottom:8px;}
.cmitem{padding:8px 0;border-top:1px solid var(--border);}
.cmitem:first-child{border-top:none;}
.cma{font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:var(--accent);margin-right:6px;}
.cmt{font-size:13px;color:var(--t1);line-height:1.55;margin-top:2px;white-space:pre-wrap;}
.cmt input{width:100%;background:var(--card);border:1px solid var(--accent);border-radius:6px;padding:6px 9px;color:var(--t1);font:13px 'Barlow',sans-serif;outline:none;}
.cmops{display:inline-flex;gap:8px;margin-left:8px;}
.cmop{font-size:10px;color:var(--t3);cursor:pointer;}
.cmop:hover{color:var(--accent);}
.cmop.del:hover{color:var(--red);}
.cmts{font-size:10px;color:var(--t3);}
.cmrow{display:flex;gap:8px;margin-top:10px;}
.cmrow input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--t1);font:13px 'Barlow',sans-serif;outline:none;}
.cmrow input:focus{border-color:var(--accent);}
/* telestration */
#drawSvg{position:absolute;display:none;z-index:6;}
#drawSvg.author{cursor:crosshair;}
.drawbar{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:7;display:none;align-items:center;gap:6px;background:rgba(12,12,18,.92);border:1px solid var(--border);border-radius:10px;padding:8px 10px;flex-wrap:wrap;max-width:calc(100% - 24px);box-shadow:0 10px 30px rgba(0,0,0,.5);}
.dtool{width:32px;height:30px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--t1);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dtool:hover{border-color:var(--accent);}
.dtool.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.dsw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;box-sizing:border-box;}
.dsw.on{border-color:#fff;box-shadow:0 0 0 2px var(--accent);}
.dsep{width:1px;height:22px;background:var(--border);margin:0 2px;}
.dbtn{padding:6px 11px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--t1);font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;}
.dbtn:hover{border-color:var(--accent);color:var(--accent);}
.dbtn.go{background:var(--green);border-color:var(--green);color:#fff;}
.dbtn.no:hover{border-color:var(--red);color:var(--red);}
.drawgo{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:7;display:none;align-items:center;gap:10px;background:rgba(12,12,18,.92);border:1px solid var(--accent);border-radius:10px;padding:9px 14px;box-shadow:0 10px 30px rgba(0,0,0,.5);}
.drawgo .dg-t{font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:#fff;}
@media(max-width:900px){.pview{grid-template-columns:1fr;}.side{order:2;position:static;max-height:50vh;}.pmain{order:1;}}
</style>
</head>
<body>
<header>
  <a href="library.html" class="logo" onclick="return plGo('library.html')">CO<span>HE</span>SION</a>
  <span class="tag">PLAYLISTS</span>
  <div class="hdr-s"></div>
  <a href="library.html" class="hdr-btn" onclick="return plGo('library.html')">← Library</a>
  <div class="hdr-btn" onclick="toggleTheme()" id="themeToggle">☀️</div>
  <div class="hdr-btn" onclick="plGo(logout)">Sign Out</div>
</header>

<div class="page">

  <!-- BROWSE -->
  <div id="browse">
    <div class="title">Playlists</div>
    <div class="sub">Clips from one game or many, played back-to-back. Pick a playlist to open the player.</div>
    <div class="pltools">
      <input type="text" id="plSearch" class="plsearch" placeholder="Search playlists — name, clip, player, game…" oninput="renderPlRows()">
      <button class="newbtn" id="newBtn" style="display:none;" onclick="newPlaylist()">＋ New playlist</button>
    </div>
    <div class="plgrid" id="plRows"><div class="pl-empty">Loading…</div></div>
  </div>

  <!-- PLAYER -->
  <div id="player" style="display:none;">
    <div class="ptop">
      <button class="backbtn" onclick="closePlayer()">← Playlists</button>
      <img id="plCover" style="display:none;width:38px;height:38px;border-radius:8px;object-fit:cover;flex:none;" alt="">
      <span class="pname" id="plName"></span>
      <span style="font-size:11px;color:var(--t3);" id="plMeta"></span>
      <span style="flex:1;"></span>
      <button id="shareBtn" class="backbtn" title="Copy a link that opens this exact playlist" onclick="sharePlaylist()">🔗 Share</button>
      <button id="coverBtn" class="backbtn" style="display:none;" title="Set a square cover image" onclick="document.getElementById('coverFile').click()">📷</button>
      <button id="coverRm" class="backbtn" style="display:none;" title="Remove cover image" onclick="plRemoveCover()">✕</button>
      <input type="file" id="coverFile" accept="image/*" style="display:none;" onchange="plPickCover(this)">
      <span class="savebar" id="saveBar" style="display:none;padding:0;gap:8px;">
        <button class="savebtn" id="saveBtn" onclick="savePlaylist()">💾 Save</button>
        <span class="status" id="plStatus"></span>
        <button class="delbtn" onclick="deletePlaylist()" style="margin-left:0;" title="Delete this entire PLAYLIST (not a drawing)">🗑 Playlist</button>
      </span>
    </div>

    <div class="pview">
      <div class="side" id="sideRows"></div>
      <div class="pmain">
        <div class="stage" id="stage" style="position:relative;">
          <div class="vid"><div id="ytMount"></div>
            <svg id="drawSvg" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="drawbar" id="drawBar">
              <button class="dtool" data-tool="select" onclick="dSetTool('select')" title="Select — click a shape, drag to move, drag its handles to resize">⇖</button>
              <span class="dsep"></span>
              <button class="dtool" data-tool="free" onclick="dSetTool('free')" title="Freehand">✎</button>
              <button class="dtool" data-tool="line" onclick="dSetTool('line')" title="Line">╱</button>
              <button class="dtool on" data-tool="arrow" onclick="dSetTool('arrow')" title="Arrow">➤</button>
              <button class="dtool" data-tool="rect" onclick="dSetTool('rect')" title="Rectangle">▭</button>
              <button class="dtool" data-tool="ellipse" onclick="dSetTool('ellipse')" title="Ellipse">◯</button>
              <button class="dtool" data-tool="poly" onclick="dSetTool('poly')" title="Polygon — click each point; click the first point to close, double-click or Enter to finish open">⬠</button>
              <span class="dsep"></span>
              <span class="dsw on" style="background:#ffd700" onclick="dSetColor('#ffd700',this)"></span>
              <span class="dsw" style="background:#ef4444" onclick="dSetColor('#ef4444',this)"></span>
              <span class="dsw" style="background:#4fc3f7" onclick="dSetColor('#4fc3f7',this)"></span>
              <span class="dsw" style="background:#4ade80" onclick="dSetColor('#4ade80',this)"></span>
              <span class="dsw" style="background:#ffffff" onclick="dSetColor('#ffffff',this)"></span>
              <input type="color" value="#ffd700" onchange="dSetColor(this.value,null)" title="Custom colour" style="width:26px;height:24px;padding:1px;border:1px solid var(--border);border-radius:5px;background:var(--card);cursor:pointer;">
              <span class="dsep"></span>
              <button class="dtool" data-w="2" onclick="dSetW(2)" title="Thin"><span style="display:block;width:14px;height:2px;background:currentColor;"></span></button>
              <button class="dtool on" data-w="4" onclick="dSetW(4)" title="Medium"><span style="display:block;width:14px;height:4px;background:currentColor;"></span></button>
              <button class="dtool" data-w="7" onclick="dSetW(7)" title="Thick"><span style="display:block;width:14px;height:7px;background:currentColor;"></span></button>
              <span class="dsep"></span>
              <button class="dtool" id="dFillBtn" onclick="dToggleFill()" title="Fill closed shapes (rectangle / ellipse / closed polygon)">◧</button>
              <input type="color" id="dFillC" value="#ffd700" onchange="dSetFillColor(this.value)" title="Fill colour (independent of the line colour)" style="width:26px;height:24px;padding:1px;border:1px solid var(--border);border-radius:5px;background:var(--card);cursor:pointer;">
              <input type="range" id="dAlphaR" min="20" max="100" value="100" oninput="dSetAlpha(this.value/100)" title="Transparency" style="width:70px;">
              <span class="dsep"></span>
              <input type="text" id="dCap" placeholder="Caption (optional)…" style="width:150px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--t1);font:12px 'Barlow',sans-serif;outline:none;">
              <span class="dsep"></span>
              <button class="dbtn no" onclick="dDelSel()" title="Delete the selected shape (Delete key)">🗑 Shape</button>
              <button class="dbtn" onclick="dUndo()">↶ Undo</button>
              <button class="dbtn no" onclick="dClear()">Clear</button>

// ── cover image: any picture becomes a centre-cropped 256px square JPEG
// (~20-40KB), stored inside the playlist itself — no file server needed.
function plInitials(name){ return String(name||'?').split(/\s+/).map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase()||'?'; }
function plHue(name){ let h=0; for(const ch of String(name||'')) h=(h*31+ch.charCodeAt(0))%360; return h; }
function plCompressImage(file){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file), img=new Image();
    img.onload=()=>{ try{
      const S=256, cv=document.createElement('canvas'); cv.width=S; cv.height=S;
      const side=Math.min(img.width,img.height);
      cv.getContext('2d').drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,S,S);
      URL.revokeObjectURL(url);
      const out=cv.toDataURL('image/jpeg',0.82);
      if(out.length>200000) rej(new Error('Image could not be compressed enough.')); else res(out);
    }catch(e){ rej(e); } };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('Could not read that image.')); };
    img.src=url;
  });
}
async function plPickCover(input){
  const f=(input.files||[])[0]; input.value='';
  if(!f||!CUR) return;
  try{ COVER=await plCompressImage(f); markDirty(); renderClips(); renderPlRows(); }
  catch(e){ alert(e.message||'Could not use that image.'); }
}

// playlist (personal playlists stay invisible to anyone but their owner).
function plSlug(name){ return String(name||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60); }
function sharePlaylist(){
  if(!CUR) return;
  const url=location.origin+location.pathname+'?pl='+CUR.id+'&n='+plSlug(CUR.name);
  const done=()=>{ const b=document.getElementById('shareBtn'); if(b){ b.textContent='✓ Copied'; setTimeout(()=>{ b.textContent='🔗 Share'; },1600); } };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done,()=>prompt('Copy this link:',url));
  else prompt('Copy this link:',url);

let deepLinked=false;
function applyDeepLink(){
  if(deepLinked||!PLAYLISTS.length) return;
  deepLinked=true;
  const p=new URLSearchParams(location.search);
  const id=p.get('pl'); if(!id) return;
  const found=PLAYLISTS.find(x=>String(x.id)===String(id));
  if(!found){ alert("That playlist isn't available to this account."); return; }
  const ci=parseInt(p.get('clip'),10);
  openPlaylist(found.id, (ci>=1)?ci-1:undefined);

function renamePlaylist(){
  const name=(prompt('Rename playlist:',CUR.name)||'').trim();
  if(!name||name===CUR.name) return;
  CUR.name=name; markDirty(); renderClips(); renderPlRows();
}
function moveClip(i,d){
  const j=i+d; if(j<0||j>=ITEMS.length) return;
  const [it]=ITEMS.splice(i,1); ITEMS.splice(j,0,it);
  if(playIdx===i) playIdx=j; else if(playIdx===j) playIdx=i;
  markDirty(); renderClips();
}
function removeClip(i){
  ITEMS.splice(i,1);
  if(playIdx===i) playIdx=-1; else if(playIdx>i) playIdx--;
  markDirty(); renderClips();
}
// HTML5 drag & drop reordering
function initDrag(){
  let src=null;
  document.querySelectorAll('.clip').forEach(row=>{
    row.addEventListener('dragstart',e=>{ src=+row.dataset.i; e.dataTransfer.effectAllowed='move'; });
    row.addEventListener('dragover',e=>{ e.preventDefault(); row.classList.add('dragover'); });
    row.addEventListener('dragleave',()=>row.classList.remove('dragover'));
    row.addEventListener('drop',e=>{
      e.preventDefault(); row.classList.remove('dragover');
      const dst=+row.dataset.i; if(src==null||src===dst) return;
      const [it]=ITEMS.splice(src,1); ITEMS.splice(dst,0,it);
      playIdx=-1; markDirty(); renderClips(); src=null;
    });
  });
}

function ensurePlayer(cb){
  if(YTP){ cb(); return; }
  const boot=()=>{ YTP=new YT.Player('ytMount',{playerVars:{rel:0,modestbranding:1,enablejsapi:1,origin:location.origin},events:{onReady:cb,onStateChange:onState}}); };
  if(window.YT&&window.YT.Player) boot();
  else { window.onYouTubeIframeAPIReady=boot; const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s); }
}
function playClip(i){
  if(!ITEMS[i]) return;
  if(drawMode) cancelDraw();
  hideSavedDrawing();
  shownDraws=new Set();
  playIdx=i;
  ensurePlayer(()=>{
    const it=ITEMS[i];
    YTP.loadVideoById({videoId:it.videoId, startSeconds:Math.max(0,Math.floor(it.start||0)), endSeconds:Math.max(1,Math.ceil(it.end||((it.start||0)+8)))});
    curVideoId=it.videoId;
    document.getElementById('nowPlaying').textContent=(i+1)+'/'+ITEMS.length+' — '+(it.label||it.code||'Clip')+(it.gameTitle?' · '+it.gameTitle:'')+(it.angle?' · 🎥 '+it.angle:'');
    const nn=document.getElementById('npNote'); if(nn) nn.textContent=it.note||'';
    // present-mode overlay
    document.getElementById('poIdx').textContent=(i+1)+' / '+ITEMS.length+(it.gameTitle?'  ·  '+it.gameTitle.toUpperCase():'')+(it.angle?'  ·  '+it.angle.toUpperCase():'');
    document.getElementById('poLbl').textContent=it.label||it.code||'Clip '+(i+1);
    document.getElementById('poNote').textContent=it.note||'';
    // per-clip angle buttons (each clip resets to its captured angle)
    plAngleIdx=null;
    loadGamesMeta().then(()=>{ if(playIdx===i) renderAngleBtns(); });
    if(!cmBusy()) renderComments(i);   // never steal a half-typed comment
  });
  renderClips();
}

function togglePresent(){

  if(playIdx<0 && ITEMS.length){ playAll=true; const b=document.getElementById('playAllBtn'); b.classList.add('on'); b.textContent='⏸ Playing…'; playClip(0); }
}
document.addEventListener('keydown',e=>{
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  if(!CUR) return;
  if(drawMode){
    if(e.key==='Escape'){ e.preventDefault(); if(dCur&&dCur.type==='poly'){ dCur=null; dCursor=null; dRender(); } else cancelDraw(); }
    else if(e.key==='Enter'){ e.preventDefault(); dFinishPoly(); }
    else if(e.key==='Delete'||e.key==='Backspace'){ e.preventDefault(); dDelSel(); }
    return;
  }
  if(e.key==='ArrowRight'){ e.preventDefault(); if(e.shiftKey) nextClip(); else seekRel(5); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); if(e.shiftKey) prevClip(); else seekRel(-5); }
  else if(e.key==='ArrowDown'){ e.preventDefault(); nextClip(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); prevClip(); }
});

// ── video size: S/M/L/Xl presets + drag handle (same as the dashboard) ──
const PL_HS=[300,440,580,720];
function plVidMaxH(){ return Math.max(220, window.innerHeight-180); }
function plSetH(px, skipSave){
  const v=document.querySelector('.stage .vid'); if(!v) return;
  px=Math.max(200, Math.min(plVidMaxH(), Math.round(px)));
  v.style.height=px+'px';
  if(!skipSave){ try{ localStorage.setItem('pl_vidH', px); }catch(_){} }
  document.querySelectorAll('.szbtn').forEach((b,i)=>b.classList.toggle('on', PL_HS[i]===px));
}
function plInitVH(){
  let saved=0; try{ saved=+localStorage.getItem('pl_vidH')||0; }catch(_){}
  plSetH(saved>=200 ? saved : 440, true);
  const h=document.getElementById('pldh');
  if(h && !h._init){ h._init=true;
    let drag=false, sy=0, sh=0;
    h.addEventListener('mousedown',e=>{ const v=document.querySelector('.stage .vid'); if(!v) return; drag=true; sy=e.clientY; sh=v.offsetHeight; h.classList.add('act'); v.style.pointerEvents='none'; document.body.style.userSelect='none'; e.preventDefault(); });
    window.addEventListener('mousemove',e=>{ if(!drag) return; const v=document.querySelector('.stage .vid'); if(!v) return; const nh=Math.max(200, Math.min(plVidMaxH(), sh+(e.clientY-sy))); v.style.height=nh+'px'; document.querySelectorAll('.szbtn').forEach(b=>b.classList.remove('on')); });
    window.addEventListener('mouseup',()=>{ if(!drag) return; drag=false; h.classList.remove('act'); const v=document.querySelector('.stage .vid'); if(v){ v.style.pointerEvents=''; try{ localStorage.setItem('pl_vidH', v.offsetHeight); }catch(_){} } document.body.style.userSelect=''; });
  }
}
function onState(e){
  if(e.data===1){                                   // playback resumed by ANY means
    if(drawMode){ if(YTP&&YTP.pauseVideo) YTP.pauseVideo(); return; }  // hold the authoring frame
    if(dispShapes) hideSavedDrawing();              // pressing play dismisses the drawing too
  }
  if(e.data===0 && playAll){        // segment ended → next
    if(playIdx+1<ITEMS.length) playClip(playIdx+1);
    else if(loop && ITEMS.length) playClip(0);
    else { playAll=false; document.getElementById('playAllBtn').classList.remove('on'); document.getElementById('playAllBtn').textContent='▶ Play all'; }
  }
}
function togglePlayAll(){
  playAll=!playAll;
  const b=document.getElementById('playAllBtn');
  b.classList.toggle('on',playAll); b.textContent=playAll?'⏸ Playing…':'▶ Play all';
  if(playAll) playClip(playIdx>=0?playIdx:0);
  else if(YTP&&YTP.pauseVideo) YTP.pauseVideo();
}
// ±5s inside the current clip (clamped to the clip's own window).
function seekRel(d){
  if(!YTP||!YTP.getCurrentTime||playIdx<0||!ITEMS[playIdx]) return;
  const it=ITEMS[playIdx];
  let t=(YTP.getCurrentTime()||0)+d;
  t=Math.max(Math.floor(it.start||0), Math.min(t, Math.ceil(it.end||(t+1))-0.5));
  YTP.seekTo(t,true);
}
// Seeking can clear YouTube's end-of-segment cue, letting a clip overrun.
// A light watchdog restores clip-end behaviour: advance (Play all) or pause.
setInterval(()=>{
  if(!YTP||!YTP.getCurrentTime||playIdx<0) return;
  const it=ITEMS[playIdx]; if(!it||it.end==null) return;
  // telestration stops: pause at each drawing's moment (once per play-through)
  if(!drawMode){
    const draws=getDraws(it);
    if(draws.length){
      const st=YTP.getPlayerState?YTP.getPlayerState():-1, tt=YTP.getCurrentTime()||0;
      if(st===1) for(let di=0;di<draws.length;di++){
        const d=draws[di], want=d.videoId||it.videoId;   // locked to the authored camera
        if(curVideoId&&want&&curVideoId!==want) continue;
        if(!shownDraws.has(di) && tt>=d.t-0.3 && tt<=Math.ceil(it.end)+0.4){
          shownDraws.add(di);
          YTP.pauseVideo&&YTP.pauseVideo();
          YTP.seekTo&&YTP.seekTo(d.t,true);              // exact frame, every play
          showSavedDrawing(d); return;
        }
      }
    }
  }
  if((YTP.getCurrentTime()||0)>Math.ceil(it.end)+0.4){
    if(playAll){
      if(playIdx+1<ITEMS.length) playClip(playIdx+1);
      else if(loop&&ITEMS.length) playClip(0);
      else { playAll=false; const b=document.getElementById('playAllBtn'); if(b){ b.classList.remove('on'); b.textContent='▶ Play all'; } YTP.pauseVideo&&YTP.pauseVideo(); }
    } else if(YTP.pauseVideo) YTP.pauseVideo();
  }
},500);
function nextClip(){ if(playIdx+1<ITEMS.length) playClip(playIdx+1); else if(loop&&ITEMS.length) playClip(0); }
function prevClip(){ if(playIdx>0) playClip(playIdx-1); else if(loop&&ITEMS.length) playClip(ITEMS.length-1); }
function toggleLoop(){ loop=!loop; document.getElementById('loopBtn').classList.toggle('on',loop); }

// ── Per-clip angle switching ──────────────────────────────────
// A clip stores its main-reference moment (driveT) and game id, so when its
// game has several camera angles the same moment can be re-derived on any of
// them. Switching is view-time only — the stored clip keeps its captured
// angle. Games' angle tables are read once from the games table and cached.
let GAMESMETA=null, plAngleIdx=null;   // plAngleIdx = view override for the CURRENT clip
async function loadGamesMeta(){
  if(GAMESMETA) return GAMESMETA;
  GAMESMETA={};
  try{
    const {data,error}=await _sb.from('games').select('meta');
    if(error) throw error;
    (data||[]).forEach(r=>{ let m=r.meta; if(typeof m==='string'){ try{ m=JSON.parse(m); }catch(_){ return; } } if(m&&m.id) GAMESMETA[m.id]=m; });
  }catch(_){}
  return GAMESMETA;
}
function plDriveToAngle(angles,driveT,idx){
  const m=angles[0],t=angles[idx]; if(!t||idx===0) return driveT;
  let period,gck;
  if(m.et2Start&&driveT>=m.et2Start){period='et2';gck=driveT-m.et2Start;}
  else if(m.et1Start&&driveT>=m.et1Start){period='et1';gck=driveT-m.et1Start;}
  else if(driveT>=(m.half2Start||0)){period='2h';gck=driveT-(m.half2Start||0);}
  else{period='1h';gck=driveT-(m.half1Start||0);}
  const ts=period==='et2'?(t.et2Start??t.half2Start):period==='et1'?(t.et1Start??t.half2Start):period==='2h'?t.half2Start:t.half1Start;
  return Math.max(0,(ts||0)+gck);
}
// Angle table for a clip's game — only if switching is possible (2+ angled
// videos AND the clip carries a main-ref driveT to re-derive from).
function plAnglesFor(it){
  if(it==null||it.driveT==null||!it.gameId||!GAMESMETA) return null;
  const g=GAMESMETA[it.gameId]; if(!g) return null;
  const A=(Array.isArray(g.angles)&&g.angles.length)?g.angles:[{label:'Main',youtubeId:g.youtubeId,half1Start:g.half1Start||0,half2Start:g.half2Start||0,et1Start:g.et1Start||null,et2Start:g.et2Start||null}];
  return A.filter(a=>a&&a.youtubeId).length>=2 ? A : null;
}
function renderAngleBtns(){
  const grp=document.getElementById('plAngleGrp'); if(!grp) return;
  const it=ITEMS[playIdx], A=plAnglesFor(it);
  if(!A){ grp.style.display='none'; grp.innerHTML=''; return; }
  const cur=plAngleIdx!=null?plAngleIdx:Math.max(0,A.findIndex(a=>a.youtubeId===it.videoId));
  grp.style.display='flex';
  grp.innerHTML=A.map((a,i)=>`<span class="angbtn${i===cur?' on':''}" onclick="plSwitchAngle(${i})" title="View this clip from ${esc(a.label||('Cam '+(i+1)))}">${esc(a.label||('Cam '+(i+1)))}</span>`).join('');
}
function plSwitchAngle(i){
  const it=ITEMS[playIdx], A=plAnglesFor(it); if(!A||!A[i]||!A[i].youtubeId) return;
  const cur=plAngleIdx!=null?plAngleIdx:Math.max(0,A.findIndex(a=>a.youtubeId===it.videoId));
  if(i===cur) return;
  plAngleIdx=i;
  const dur=Math.max(1,(it.end||0)-(it.start||0));
  const vs=plDriveToAngle(A,it.driveT,i);
  YTP.loadVideoById({videoId:A[i].youtubeId, startSeconds:Math.max(0,Math.floor(vs)), endSeconds:Math.max(1,Math.ceil(vs+dur))});
  curVideoId=A[i].youtubeId;
  const nm=A[i].label||('Cam '+(i+1));
  document.getElementById('nowPlaying').textContent=(playIdx+1)+'/'+ITEMS.length+' — '+(it.label||it.code||'Clip')+(it.gameTitle?' · '+it.gameTitle:'')+' · 🎥 '+nm;
  document.getElementById('poIdx').textContent=(playIdx+1)+' / '+ITEMS.length+(it.gameTitle?'  ·  '+it.gameTitle.toUpperCase():'')+'  ·  '+nm.toUpperCase();
  renderAngleBtns();
}

// ── Telestration (P2): draw, select/move/resize, fill+alpha, captions,
// multiple stops per clip. Shapes are fractions of the video's 16:9 content
// rectangle so drawings stay glued to the pitch at any size / fullscreen.
// Saved drawings are ADMIN-authored (coach's voice); viewers watch them.
let drawMode=false, dTool='arrow', dColor='#ffd700', dFillC='#ffd700', dW=4, dFill=false, dAlpha=1, dVid=null, dCursor=null;
let dShapes=null, dT=0, dCur=null, dSel=null, dDrag=null, editIdx=null;
let dispShapes=null, shownDraws=new Set();
function getDraws(it){ return Array.isArray(it&&it.draws)?it.draws:(it&&it.draw?[it.draw]:[]); }
function vidRect(){
  const v=document.querySelector('.stage .vid'); if(!v) return {x:0,y:0,w:16,h:9};
  const W=v.clientWidth,H=v.clientHeight, ar=16/9;
  let w=W,h=W/ar; if(h>H){ h=H; w=H*ar; }
  return {x:(W-w)/2, y:(H-h)/2, w, h};
}
function sizeDrawSvg(){
  const s=document.getElementById('drawSvg'); if(!s||s.style.display==='none') return;
  const r=vidRect();
  s.style.left=r.x+'px'; s.style.top=r.y+'px';
  s.setAttribute('width',r.w); s.setAttribute('height',r.h);
  s.setAttribute('viewBox','0 0 '+r.w+' '+r.h);
  dRender();
}
function shapeSvg(s,W,H){
  const X=x=>(x*W).toFixed(1), Y=y=>(y*H).toFixed(1), col=esc(s.color), w=s.w;
  const fill=s.fill?esc(s.fillColor||s.color):'none', fo=s.fill?' fill-opacity="0.35"':'';
  let inner='';
  if(s.type==='free') inner='<polyline points="'+s.pts.map(p=>X(p[0])+','+Y(p[1])).join(' ')+'" fill="none" stroke="'+col+'" stroke-width="'+w+'" stroke-linecap="round" stroke-linejoin="round"/>';
  else if(s.type==='poly'){
    const pts=s.pts.map(p=>X(p[0])+','+Y(p[1])).join(' ');
    inner=s.closed?'<polygon points="'+pts+'" fill="'+fill+'"'+fo+' stroke="'+col+'" stroke-width="'+w+'" stroke-linejoin="round"/>'
                  :'<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="'+w+'" stroke-linecap="round" stroke-linejoin="round"/>';
  }
  else if(s.type==='line') inner='<line x1="'+X(s.x1)+'" y1="'+Y(s.y1)+'" x2="'+X(s.x2)+'" y2="'+Y(s.y2)+'" stroke="'+col+'" stroke-width="'+w+'" stroke-linecap="round"/>';
  else if(s.type==='arrow'){
    const x1=+X(s.x1),y1=+Y(s.y1),x2=+X(s.x2),y2=+Y(s.y2);
    const a=Math.atan2(y2-y1,x2-x1), hl=8+w*2.2;
    const p1=(x2-hl*Math.cos(a-0.45)).toFixed(1)+','+(y2-hl*Math.sin(a-0.45)).toFixed(1);
    const p2=(x2-hl*Math.cos(a+0.45)).toFixed(1)+','+(y2-hl*Math.sin(a+0.45)).toFixed(1);
    inner='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="'+w+'" stroke-linecap="round"/>'
        +'<polygon points="'+x2+','+y2+' '+p1+' '+p2+'" fill="'+col+'"/>';
  }
  else if(s.type==='rect'){ const x=Math.min(s.x1,s.x2),y=Math.min(s.y1,s.y2); inner='<rect x="'+X(x)+'" y="'+Y(y)+'" width="'+((Math.abs(s.x2-s.x1))*W).toFixed(1)+'" height="'+((Math.abs(s.y2-s.y1))*H).toFixed(1)+'" fill="'+fill+'"'+fo+' stroke="'+col+'" stroke-width="'+w+'"/>'; }
  else if(s.type==='ellipse'){ inner='<ellipse cx="'+X((s.x1+s.x2)/2)+'" cy="'+Y((s.y1+s.y2)/2)+'" rx="'+((Math.abs(s.x2-s.x1)/2)*W).toFixed(1)+'" ry="'+((Math.abs(s.y2-s.y1)/2)*H).toFixed(1)+'" fill="'+fill+'"'+fo+' stroke="'+col+'" stroke-width="'+w+'"/>'; }
  return '<g opacity="'+(s.alpha!=null?s.alpha:1)+'">'+inner+'</g>';
}
// Resize handles: endpoints for lines/arrows, four corners for rect/ellipse.
function dHandlePts(s){
  if(!s) return [];
  if(s.type==='line'||s.type==='arrow') return [{x:s.x1,y:s.y1,id:'p1'},{x:s.x2,y:s.y2,id:'p2'}];
  if(s.type==='rect'||s.type==='ellipse') return [
    {x:s.x1,y:s.y1,id:'c11'},{x:s.x2,y:s.y1,id:'c21'},{x:s.x1,y:s.y2,id:'c12'},{x:s.x2,y:s.y2,id:'c22'}];
  if(s.type==='poly') return s.pts.map((p,i)=>({x:p[0],y:p[1],id:'v'+i}));
  return [];   // freehand: move only
}
function dApplyHandle(s,id,x,y){
  if(id[0]==='v'){ const i=+id.slice(1); if(s.pts&&s.pts[i]) s.pts[i]=[x,y]; return; }
  if(id==='p1'){ s.x1=x; s.y1=y; }
  else if(id==='p2'){ s.x2=x; s.y2=y; }
  else if(id==='c11'){ s.x1=x; s.y1=y; }
  else if(id==='c21'){ s.x2=x; s.y1=y; }
  else if(id==='c12'){ s.x1=x; s.y2=y; }
  else if(id==='c22'){ s.x2=x; s.y2=y; }
}
function dMoveShape(s,dx,dy){
  if(s.type==='free'||s.type==='poly') s.pts=s.pts.map(p=>[p[0]+dx,p[1]+dy]);
  else { s.x1+=dx; s.y1+=dy; s.x2+=dx; s.y2+=dy; }
}
function dRender(){
  const s=document.getElementById('drawSvg'); if(!s) return;
  const W=+s.getAttribute('width')||1, H=+s.getAttribute('height')||1;
  const list=(drawMode?dShapes:dispShapes)||[];
  let out=list.concat(dCur?[dCur]:[]).map(x=>shapeSvg(x,W,H)).join('');
  if(dCur&&dCur.type==='poly'&&dCursor){
    const lp=dCur.pts[dCur.pts.length-1];
    out+='<line x1="'+(lp[0]*W)+'" y1="'+(lp[1]*H)+'" x2="'+(dCursor[0]*W)+'" y2="'+(dCursor[1]*H)+'" stroke="'+esc(dCur.color)+'" stroke-width="'+dCur.w+'" stroke-dasharray="5,4" opacity=".7"/>';
    out+='<circle cx="'+(dCur.pts[0][0]*W)+'" cy="'+(dCur.pts[0][1]*H)+'" r="7" fill="none" stroke="#fff" stroke-width="1.2" stroke-dasharray="3,2"/>';
  }
  if(drawMode&&dSel!=null&&dShapes[dSel]){
    const sh=dShapes[dSel];
    if(sh.type==='free'){
      const xs=sh.pts.map(p=>p[0]), ys=sh.pts.map(p=>p[1]);
      out+='<rect x="'+(Math.min(...xs)*W-4)+'" y="'+(Math.min(...ys)*H-4)+'" width="'+((Math.max(...xs)-Math.min(...xs))*W+8)+'" height="'+((Math.max(...ys)-Math.min(...ys))*H+8)+'" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="4,3"/>';
    }
    dHandlePts(sh).forEach(h=>{
      out+='<rect x="'+(h.x*W-5)+'" y="'+(h.y*H-5)+'" width="10" height="10" fill="#fff" stroke="#000" stroke-width="1.2" style="cursor:nwse-resize"/>';
    });
  }
  s.innerHTML=out;
}
function dPos(e){
  const s=document.getElementById('drawSvg'), r=s.getBoundingClientRect();
  return [Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)), Math.max(0,Math.min(1,(e.clientY-r.top)/r.height))];
}
// hit-testing in pixel space (tolerance in px)
function segDistPx(px,py,ax,ay,bx,by){
  const dx=bx-ax, dy=by-ay, L2=dx*dx+dy*dy;
  const t=L2?Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/L2)):0;
  return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}
function dHitShape(s,x,y,W,H,tol){
  const px=x*W, py=y*H;
  if(s.type==='line'||s.type==='arrow') return segDistPx(px,py,s.x1*W,s.y1*H,s.x2*W,s.y2*H)<=tol;
  if(s.type==='rect'){
    const x1=Math.min(s.x1,s.x2)*W,x2=Math.max(s.x1,s.x2)*W,y1=Math.min(s.y1,s.y2)*H,y2=Math.max(s.y1,s.y2)*H;
    if(s.fill&&px>=x1&&px<=x2&&py>=y1&&py<=y2) return true;
    return Math.min(segDistPx(px,py,x1,y1,x2,y1),segDistPx(px,py,x2,y1,x2,y2),segDistPx(px,py,x2,y2,x1,y2),segDistPx(px,py,x1,y2,x1,y1))<=tol;
  }
  if(s.type==='ellipse'){
    const cx=(s.x1+s.x2)/2*W, cy=(s.y1+s.y2)/2*H, rx=Math.max(1,Math.abs(s.x2-s.x1)/2*W), ry=Math.max(1,Math.abs(s.y2-s.y1)/2*H);
    const v=Math.pow((px-cx)/rx,2)+Math.pow((py-cy)/ry,2);
    if(s.fill&&v<=1) return true;
    return Math.abs(Math.sqrt(v)-1)*Math.min(rx,ry)<=tol;
  }
  if(s.type==='free'||s.type==='poly'){
    for(let i=1;i<s.pts.length;i++) if(segDistPx(px,py,s.pts[i-1][0]*W,s.pts[i-1][1]*H,s.pts[i][0]*W,s.pts[i][1]*H)<=tol) return true;
    if(s.type==='poly'&&s.closed){
      const n=s.pts.length;
      if(segDistPx(px,py,s.pts[n-1][0]*W,s.pts[n-1][1]*H,s.pts[0][0]*W,s.pts[0][1]*H)<=tol) return true;
      if(s.fill){ let inside=false;                        // ray cast
        for(let i=0,j=n-1;i<n;j=i++){
          const xi=s.pts[i][0]*W, yi=s.pts[i][1]*H, xj=s.pts[j][0]*W, yj=s.pts[j][1]*H;
          if(((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside;
        }
        if(inside) return true;
      }
    }
  }
  return false;
}
function dHitAt(x,y){
  const s=document.getElementById('drawSvg');
  const W=+s.getAttribute('width')||1, H=+s.getAttribute('height')||1;
  for(let i=dShapes.length-1;i>=0;i--) if(dHitShape(dShapes[i],x,y,W,H,9)) return i;
  return null;
}
function dHitHandle(x,y){
  if(dSel==null||!dShapes[dSel]) return null;
  const s=document.getElementById('drawSvg');
  const W=+s.getAttribute('width')||1, H=+s.getAttribute('height')||1;
  for(const h of dHandlePts(dShapes[dSel])) if(Math.hypot((x-h.x)*W,(y-h.y)*H)<=10) return h.id;
  return null;
}
function dInit(){
  const s=document.getElementById('drawSvg'); if(!s||s._init) return; s._init=true;
  s.addEventListener('pointerdown',e=>{
    if(!drawMode) return; e.preventDefault(); s.setPointerCapture&&s.setPointerCapture(e.pointerId);
    const [x,y]=dPos(e);
    if(dTool==='select'){
      const h=dHitHandle(x,y);
      if(h){ dDrag={mode:'resize',h}; return; }
      const idx=dHitAt(x,y);
      if(idx!=null){ dSel=idx; dSyncToolbar(); dDrag={mode:'move',lx:x,ly:y}; }
      else dSel=null;
      dRender(); return;
    }
    dSel=null;
    if(dTool==='poly'){
      const svgEl=document.getElementById('drawSvg');
      const W=+svgEl.getAttribute('width')||1, H=+svgEl.getAttribute('height')||1;
      if(dCur&&dCur.type==='poly'){
        const p0=dCur.pts[0];
        if(dCur.pts.length>=3 && Math.hypot((x-p0[0])*W,(y-p0[1])*H)<=12){   // close the shape
          dCur.closed=true; dCur.fill=dFill; dShapes.push(dCur); dCur=null; dCursor=null;
        } else dCur.pts.push([x,y]);
      } else dCur={type:'poly',pts:[[x,y]],closed:false,color:dColor,fillColor:dFillC,w:dW,alpha:dAlpha};
      dRender(); return;
    }
    dCur = dTool==='free' ? {type:'free',pts:[[x,y]],color:dColor,w:dW,alpha:dAlpha}
         : {type:dTool,x1:x,y1:y,x2:x,y2:y,color:dColor,w:dW,alpha:dAlpha,fill:(dTool==='rect'||dTool==='ellipse')?dFill:undefined,fillColor:dFillC};
    dRender();
  });
  s.addEventListener('pointermove',e=>{
    if(!drawMode) return;
    const [x,y]=dPos(e);
    if(dDrag&&dSel!=null&&dShapes[dSel]){
      if(dDrag.mode==='resize') dApplyHandle(dShapes[dSel],dDrag.h,x,y);
      else { dMoveShape(dShapes[dSel],x-dDrag.lx,y-dDrag.ly); dDrag.lx=x; dDrag.ly=y; }
      dRender(); return;
    }
    if(!dCur) return;
    if(dCur.type==='poly'){ dCursor=[x,y]; dRender(); return; }
    if(dCur.type==='free') dCur.pts.push([x,y]); else { dCur.x2=x; dCur.y2=y; }
    dRender();
  });
  s.addEventListener('dblclick',e=>{ if(drawMode&&dCur&&dCur.type==='poly'){ e.preventDefault(); dFinishPoly(); } });
  s.addEventListener('pointerup',()=>{
    if(!drawMode) return;
    if(dDrag){ dDrag=null; return; }
    if(!dCur||dCur.type==='poly') return;
    const tiny = dCur.type==='free' ? dCur.pts.length<3 : (Math.abs(dCur.x2-dCur.x1)<0.005&&Math.abs(dCur.y2-dCur.y1)<0.005);
    if(!tiny) dShapes.push(dCur);
    dCur=null; dRender();
  });
}
function dSetTool(t){ dTool=t; if(t!=='select'){ dSel=null; dRender(); } if(t!=='poly'&&dCur&&dCur.type==='poly'){ dFinishPoly(); } document.querySelectorAll('.dtool[data-tool]').forEach(b=>b.classList.toggle('on',b.dataset.tool===t)); }
function dFinishPoly(){
  if(dCur&&dCur.type==='poly'){ if(dCur.pts.length>=2) dShapes.push(dCur); dCur=null; dCursor=null; dRender(); }
}
function dApplySel(mut){ if(drawMode&&dSel!=null&&dShapes[dSel]){ mut(dShapes[dSel]); dRender(); } }
function dSetColor(cl,el){ dColor=cl; document.querySelectorAll('.dsw').forEach(b=>b.classList.toggle('on',b===el)); dApplySel(s=>s.color=cl); }
function dSetW(w){ dW=w; document.querySelectorAll('.dtool[data-w]').forEach(b=>b.classList.toggle('on',+b.dataset.w===w)); dApplySel(s=>s.w=w); }
function dToggleFill(){ dFill=!dFill; document.getElementById('dFillBtn').classList.toggle('on',dFill); dApplySel(s=>{ if(s.type==='rect'||s.type==='ellipse'||(s.type==='poly'&&s.closed)) s.fill=dFill; }); }
function dSetFillColor(cl){ dFillC=cl; dApplySel(s=>s.fillColor=cl); }
function dSetAlpha(a){ dAlpha=a; dApplySel(s=>s.alpha=a); }
function dSyncToolbar(){
  const s=dShapes[dSel]; if(!s) return;
  dColor=s.color; dW=s.w; dAlpha=s.alpha!=null?s.alpha:1; dFill=!!s.fill; dFillC=s.fillColor||s.color;
  const fc=document.getElementById('dFillC'); if(fc) fc.value=dFillC;
  document.querySelectorAll('.dtool[data-w]').forEach(b=>b.classList.toggle('on',+b.dataset.w===dW));
  document.getElementById('dFillBtn').classList.toggle('on',dFill);
  const r=document.getElementById('dAlphaR'); if(r) r.value=Math.round(dAlpha*100);
  document.querySelectorAll('.dsw').forEach(b=>b.classList.remove('on'));
}
function dUndo(){ if(drawMode&&dShapes.length){ dShapes.pop(); if(dSel!=null&&dSel>=dShapes.length) dSel=null; dRender(); } }
function dClear(){ if(drawMode){ dShapes=[]; dSel=null; dRender(); } }
function dDelSel(){ if(drawMode&&dSel!=null&&dShapes[dSel]){ dShapes.splice(dSel,1); dSel=null; dRender(); } }
function startDraw(){
  if(playIdx<0||!ITEMS[playIdx]){ alert('Play or select a clip first, then pause where you want to draw.'); return; }
  if(!isAdmin) return;
  if(YTP&&YTP.pauseVideo) YTP.pauseVideo();
  const it=ITEMS[playIdx], draws=getDraws(it);
  const cur=(YTP&&YTP.getCurrentTime)?YTP.getCurrentTime():(it.start||0);
  editIdx=null;
  for(let i=0;i<draws.length;i++) if(Math.abs(draws[i].t-cur)<1.5){ editIdx=i; break; }
  const stop=editIdx!=null?draws[editIdx]:null;
  drawMode=true; dispShapes=null; dSel=null; dDrag=null; dCursor=null;
  dShapes=stop?stop.shapes.map(x=>JSON.parse(JSON.stringify(x))):[];
  dT=stop?stop.t:cur;
  dVid=(stop&&stop.videoId)||curVideoId||it.videoId||null;
  if(stop&&YTP&&YTP.seekTo) YTP.seekTo(stop.t,true);   // draw on the exact stored frame
  const cap=document.getElementById('dCap'); if(cap) cap.value=(stop&&stop.caption)||'';
  const s=document.getElementById('drawSvg'); s.style.display='block'; s.classList.add('author'); s.style.pointerEvents='auto';
  document.getElementById('drawBar').style.display='flex';
  document.getElementById('drawGo').style.display='none';
  dInit(); sizeDrawSvg();
}
function exitDraw(){
  drawMode=false; dCur=null; dSel=null; dDrag=null;
  const s=document.getElementById('drawSvg'); s.classList.remove('author'); s.style.pointerEvents='none';
  if(!dispShapes) s.style.display='none';
  document.getElementById('drawBar').style.display='none';
}
function cancelDraw(){ dShapes=null; exitDraw(); }
function saveDraw(){
  const it=ITEMS[playIdx]; if(!it){ exitDraw(); return; }
  const caption=((document.getElementById('dCap')||{}).value||'').trim();
  const draws=getDraws(it).map(x=>JSON.parse(JSON.stringify(x)));
  const stop={t:dT, shapes:dShapes};
  if(caption) stop.caption=caption;
  if(dVid) stop.videoId=dVid;
  if(editIdx!=null){ if(dShapes.length) draws[editIdx]=stop; else draws.splice(editIdx,1); }
  else if(dShapes.length) draws.push(stop);
  draws.sort((a,b)=>a.t-b.t);
  if(draws.length) it.draws=draws; else delete it.draws;
  delete it.draw;
  markDirty(); exitDraw(); renderClips();
  const st=document.getElementById('plStatus'); if(st){ st.textContent=draws.length?'Drawing saved — remember 💾 Save':'Drawing removed — remember 💾 Save'; st.style.color='var(--orange)'; }
}
function showSavedDrawing(d){
  dispShapes=d.shapes||[];
  const t=document.getElementById('dgT'); if(t) t.textContent=d.caption||"✏ Coach's drawing";
  const s=document.getElementById('drawSvg'); s.style.display='block'; s.style.pointerEvents='none';
  document.getElementById('drawGo').style.display='flex';
  sizeDrawSvg();
}
function hideSavedDrawing(){
  dispShapes=null;
  if(!drawMode){ const s=document.getElementById('drawSvg'); if(s) s.style.display='none'; }
  const g=document.getElementById('drawGo'); if(g) g.style.display='none';
}
function continueDrawing(){ hideSavedDrawing(); if(YTP&&YTP.playVideo) YTP.playVideo(); }
window.addEventListener('resize',()=>sizeDrawSvg());
document.addEventListener('fullscreenchange',()=>setTimeout(sizeDrawSvg,80));

// ── leave guard (unsaved playlist edits) ──────────────────────
cohesionSetGuard(()=>dirty, savePlaylist);
function plGo(t){ cohesionGuardedGo(t); return false; }

netlifyIdentity.on('init',()=>loadPlaylists());
netlifyIdentity.init();
setTimeout(()=>{ if(!PLAYLISTS.length) loadPlaylists(); },1500);
</script>
