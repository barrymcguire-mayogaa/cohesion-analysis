<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COHESION — Playlists</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{
  --bg:#181820;--panel:#1e1e28;--card:#252530;--hover:#2c2c3a;
  --border:rgba(255,255,255,0.08);--t1:#f0f0f5;--t2:#8888a0;--t3:#52526a;
  --accent:#4fc3f7;--accent-bg:rgba(79,195,247,0.12);--shadow:rgba(0,0,0,0.4);
  --green:#4caf50;--green-bg:rgba(76,175,80,0.12);
  --red:#f44336;--red-bg:rgba(244,67,54,0.12);--orange:#ff9800;--logo-color:#ffffff;
}
[data-theme="light"]{
  --bg:#f0eeeb;--panel:#ffffff;--card:#f7f6f3;--hover:#ebe9e5;
  --border:rgba(0,0,0,0.1);--t1:#1a1a28;--t2:#555572;--t3:#888899;
  --accent:#0369a1;--accent-bg:rgba(3,105,161,0.08);--shadow:rgba(0,0,0,0.12);
  --green:#15803d;--green-bg:rgba(21,128,61,0.1);--logo-color:#1a1a28;
  --red:#b91c1c;--red-bg:rgba(185,28,28,0.1);--orange:#d97706;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;}
header{height:54px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;letter-spacing:4px;color:var(--logo-color);text-decoration:none;}
.tag{font:800 10px 'Barlow Condensed',sans-serif;letter-spacing:2px;color:var(--accent);border:1px solid var(--accent);border-radius:5px;padding:2px 7px;}
.hdr-s{flex:1;}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:var(--t2);border:1px solid var(--border);background:var(--card);text-decoration:none;cursor:pointer;}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);}
.page{padding:16px;max-width:1500px;margin:0 auto;}
.title{font:800 24px 'Barlow Condensed',sans-serif;letter-spacing:1px;}
.sub{font-size:12px;color:var(--t2);margin-bottom:14px;}

.grid{display:grid;grid-template-columns:280px 1fr;gap:14px;align-items:start;}
@media(max-width:900px){.grid{grid-template-columns:1fr;}}

/* playlist list */
.pl-list{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.pl-list .hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font:700 11px 'Barlow Condensed',sans-serif;letter-spacing:1px;color:var(--t3);text-transform:uppercase;}
.pl-list .hd .newbtn{margin-left:auto;padding:4px 10px;border-radius:6px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);font:700 11px 'Barlow Condensed',sans-serif;cursor:pointer;}
.pl-row{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;}
.pl-row:hover{background:var(--hover);}
.pl-row.on{background:var(--accent-bg);border-left:3px solid var(--accent);padding-left:9px;}
.pl-row .nm{font:700 14px 'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.pl-row .mt{font-size:11px;color:var(--t3);}
.pl-empty{padding:18px 12px;color:var(--t3);font-size:12px;line-height:1.5;}
.pl-thumb{width:42px;height:42px;border-radius:8px;flex:none;object-fit:cover;background:var(--card);}
.pl-thumb.ph{display:flex;align-items:center;justify-content:center;font:800 15px 'Barlow Condensed',sans-serif;color:#fff;}
.pl-rowin{display:flex;gap:10px;align-items:center;}

/* player + clips */
.stage{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.stage .vid{width:100%;height:440px;background:#000;}
.stage .vid iframe{width:100%;height:100%;border:none;}
.vbar{display:flex;gap:6px;align-items:center;padding:8px 10px;border-top:1px solid var(--border);flex-wrap:wrap;}
.vbtn{background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--t1);font:700 12px 'Barlow Condensed',sans-serif;padding:8px 13px;cursor:pointer;}
.vbtn:hover{border-color:var(--accent);color:var(--accent);}
.vbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.nowp{font:600 12px 'Barlow',sans-serif;color:var(--t2);flex:1;min-width:160px;}
.angbtn{padding:5px 9px;border-radius:6px;font:700 10px 'Barlow Condensed',sans-serif;letter-spacing:.4px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--t2);}
.angbtn:hover{border-color:var(--accent);color:var(--accent);}
.angbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;}

.clips{margin-top:14px;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.clips .hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.clips .hd .pname{font:800 17px 'Barlow Condensed',sans-serif;letter-spacing:.5px;flex:1;}
.clips .hd input{background:var(--card);border:1px solid var(--accent);border-radius:6px;padding:6px 9px;color:var(--t1);font:700 15px 'Barlow Condensed',sans-serif;flex:1;outline:none;}
.clip{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:grab;}
.clip:hover{background:var(--hover);}
.clip.on{background:var(--accent-bg);}
.clip.dragover{border-top:2px solid var(--accent);}
.clip .idx{font:700 11px 'Barlow Condensed',sans-serif;color:var(--t3);min-width:20px;text-align:right;}
.clip .grip{color:var(--t3);cursor:grab;font-size:13px;flex:none;}
.clip .lbl{font:600 14px 'Barlow',sans-serif;flex:1;min-width:120px;cursor:text;}
.clip .lbl:hover{color:var(--accent);}
.clip .lbl input{width:100%;background:var(--card);border:1px solid var(--accent);border-radius:6px;padding:5px 8px;color:var(--t1);font:600 14px 'Barlow',sans-serif;outline:none;}
.clip .lblwrap{flex:1;min-width:120px;}
.clip .nt{font-size:11.5px;color:var(--t2);margin-top:2px;line-height:1.4;}
.clip .nt.ghost{color:var(--t3);font-style:italic;cursor:pointer;}
.clip .nt.ghost:hover{color:var(--accent);}
.clip .nt input{width:100%;background:var(--card);border:1px solid var(--accent);border-radius:6px;padding:4px 8px;color:var(--t1);font:400 12px 'Barlow',sans-serif;outline:none;}
/* present mode (fullscreen) */
.stage:fullscreen{display:flex;flex-direction:column;background:#000;border:none;border-radius:0;}
.stage:fullscreen .vid{flex:1;height:auto;}
.stage:fullscreen .vbar{background:rgba(10,10,16,.92);border-top:1px solid rgba(255,255,255,.1);}
.presover{display:none;}
.stage:fullscreen .presover{display:block;position:absolute;left:0;right:0;bottom:64px;padding:14px 26px;background:linear-gradient(transparent,rgba(0,0,0,.78));pointer-events:none;}
.presover .po-lbl{font:800 26px 'Barlow Condensed',sans-serif;letter-spacing:.5px;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);}
.presover .po-note{font:400 16px 'Barlow',sans-serif;color:rgba(255,255,255,.85);margin-top:4px;max-width:900px;line-height:1.5;text-shadow:0 1px 6px rgba(0,0,0,.8);}
.presover .po-idx{font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:1px;color:rgba(255,255,255,.55);margin-bottom:4px;}
.clip .meta{font-size:11px;color:var(--t3);white-space:nowrap;}
.clip .cbt{background:none;border:1px solid var(--border);border-radius:6px;color:var(--t2);font-size:11px;padding:4px 8px;cursor:pointer;flex:none;}
.clip .cbt:hover{border-color:var(--accent);color:var(--accent);}
.clip .cbt.x:hover{border-color:var(--red);color:var(--red);}
.savebar{padding:10px 12px;display:flex;gap:8px;align-items:center;}
.savebtn{padding:9px 16px;border-radius:8px;border:1px solid var(--green);background:var(--green);color:#fff;font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;}
.delbtn{padding:9px 14px;border-radius:8px;border:1px solid var(--red);background:none;color:var(--red);font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;margin-left:auto;}
.status{font-size:12px;color:var(--t2);min-height:16px;}
.empty-stage{padding:60px 20px;text-align:center;color:var(--t3);font-size:13px;line-height:1.7;}
/* browse grid (library-style) */
.pltools{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.plsearch{flex:1;min-width:220px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--t1);font:13px 'Barlow',sans-serif;outline:none;}
.plsearch:focus{border-color:var(--accent);}
.newbtn{padding:9px 16px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent);font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;}
.newbtn:hover{background:var(--accent);color:#fff;}
.plgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.plcard{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .18s;}
.plcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow);}
.plcard .art{aspect-ratio:1/1;width:100%;object-fit:cover;display:block;background:var(--card);}
.plcard .art.ph{display:flex;align-items:center;justify-content:center;font:800 44px 'Barlow Condensed',sans-serif;color:#fff;}
.plcard .bd{padding:11px 12px;}
.plcard .nm{font:800 15px 'Barlow Condensed',sans-serif;letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.plcard .mt{font-size:11px;color:var(--t3);margin-top:2px;display:flex;gap:6px;align-items:center;}
.scopebadge{font:700 9px 'Barlow Condensed',sans-serif;letter-spacing:.5px;border:1px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--t2);}
.pl-empty{padding:40px 12px;color:var(--t3);font-size:13px;text-align:center;line-height:1.7;grid-column:1/-1;}

/* player view: sidebar left, video right */
.ptop{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.ptop .pname{font:800 20px 'Barlow Condensed',sans-serif;letter-spacing:.5px;}
.ptop .pname.rn{cursor:pointer;}
.ptop .pname.rn:hover{color:var(--accent);}
.backbtn{padding:8px 13px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--t2);font:700 12px 'Barlow Condensed',sans-serif;letter-spacing:.5px;cursor:pointer;}
.backbtn:hover{border-color:var(--accent);color:var(--accent);}
.pview{display:grid;grid-template-columns:310px 1fr;gap:14px;align-items:start;}
.side{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow-y:auto;max-height:calc(100vh - 150px);position:sticky;top:66px;}
.clip{cursor:pointer;}
.clip .smeta{font-size:10.5px;color:var(--t3);margin-top:1px;}
.npbar{margin-top:10px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.npbar .npt{font:800 15px 'Barlow Condensed',sans-serif;letter-spacing:.5px;flex:1;min-width:180px;}
.npbar .npn{width:100%;font-size:13px;color:var(--t2);line-height:1.55;}
.npbar .npn:empty{display:none;}
@media(max-width:900px){.pview{grid-template-columns:1fr;}.side{order:2;position:static;max-height:50vh;}.pmain{order:1;}}
</style>
</head>
<body>
<header>
  <a href="library.html" class="logo" onclick="return plGo('library.html')">CO<span>HE</span>SION</a>
  <span class="tag">PLAYLISTS</span>
  <div class="hdr-s"></div>
  <a href="library.html" class="hdr-btn" onclick="return plGo('library.html')">← Library</a>
  <div class="hdr-btn" onclick="toggleTheme()" id="themeToggle">☀️</div>
  <div class="hdr-btn" onclick="plGo(logout)">Sign Out</div>
</header>

<div class="page">

  <!-- BROWSE -->
  <div id="browse">
    <div class="title">Playlists</div>
    <div class="sub">Clips from one game or many, played back-to-back. Pick a playlist to open the player.</div>
    <div class="pltools">
      <input type="text" id="plSearch" class="plsearch" placeholder="Search playlists — name, clip, player, game…" oninput="renderPlRows()">
      <button class="newbtn" id="newBtn" style="display:none;" onclick="newPlaylist()">＋ New playlist</button>
    </div>
    <div class="plgrid" id="plRows"><div class="pl-empty">Loading…</div></div>
  </div>

  <!-- PLAYER -->
  <div id="player" style="display:none;">
    <div class="ptop">
      <button class="backbtn" onclick="closePlayer()">← Playlists</button>
      <img id="plCover" style="display:none;width:38px;height:38px;border-radius:8px;object-fit:cover;flex:none;" alt="">
      <span class="pname" id="plName"></span>
      <span style="font-size:11px;color:var(--t3);" id="plMeta"></span>
      <span style="flex:1;"></span>
      <button id="shareBtn" class="backbtn" title="Copy a link that opens this exact playlist" onclick="sharePlaylist()">🔗 Share</button>
      <button id="coverBtn" class="backbtn" style="display:none;" title="Set a square cover image" onclick="document.getElementById('coverFile').click()">📷</button>
      <button id="coverRm" class="backbtn" style="display:none;" title="Remove cover image" onclick="plRemoveCover()">✕</button>
      <input type="file" id="coverFile" accept="image/*" style="display:none;" onchange="plPickCover(this)">
      <span class="savebar" id="saveBar" style="display:none;padding:0;gap:8px;">
        <button class="savebtn" id="saveBtn" onclick="savePlaylist()">💾 Save</button>
        <span class="status" id="plStatus"></span>
        <button class="delbtn" onclick="deletePlaylist()" style="margin-left:0;">🗑</button>
      </span>
    </div>

    <div class="pview">
      <div class="side" id="sideRows"></div>
      <div class="pmain">
        <div class="stage" id="stage" style="position:relative;">
          <div class="vid"><div id="ytMount"></div></div>
          <div class="presover" id="presOver">
            <div class="po-idx" id="poIdx"></div>
            <div class="po-lbl" id="poLbl"></div>
            <div class="po-note" id="poNote"></div>
          </div>
          <div class="vbar">
            <button class="vbtn" onclick="prevClip()">⏮ Prev</button>
            <button class="vbtn" id="playAllBtn" onclick="togglePlayAll()">▶ Play all</button>
            <button class="vbtn" onclick="nextClip()">Next ⏭</button>
            <button class="vbtn" id="loopBtn" onclick="toggleLoop()">⟳ Loop</button>
            <button class="vbtn" onclick="togglePresent()" title="Fullscreen presentation — clip name and note overlaid; ←/→ = 5s back/forward, Shift+←/→ = previous/next clip, Esc exits">⛶ Present</button>
          </div>
        </div>
        <div class="npbar">
          <span class="npt" id="nowPlaying">Select a clip on the left to start.</span>
          <span id="plAngleGrp" style="display:none;gap:4px;align-items:center;"></span>
          <div class="npn" id="npNote"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="cohesion-edit.js"></script>
<script>
if(!sessionStorage.getItem('cohesion_auth')) window.location.href='index.html';
const isAdmin = sessionStorage.getItem('cohesion_auth')==='admin';
function logout(){ netlifyIdentity.logout(); sessionStorage.clear(); window.location.href='index.html'; }
const SUPABASE_URL='https://uycptgjngtoxuawnsdzi.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5Y3B0Z2puZ3RveHVhd25zZHppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNjk5NDAsImV4cCI6MjA5MjY0NTk0MH0.PLmf6zZ1Aa_v98agzKO_Sje3Aak6n2uZOX9rQsfSV0E';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
function initTheme(){const t=localStorage.getItem('cohesion_theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeToggle').textContent=t==='dark'?'☀️':'🌙';}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('cohesion_theme',n);document.getElementById('themeToggle').textContent=n==='dark'?'☀️':'🌙';}
initTheme();
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function fmt(s){ s=Math.max(0,Math.round(s)); const m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }

// ── state ─────────────────────────────────────────────────────
let PLAYLISTS=[], CUR=null, ITEMS=[], COVER=null, dirty=false;
let YTP=null, playIdx=-1, playAll=false, loop=false, curVideoId=null;

// ── auth'd writes (admin JWT → playlists function) ────────────
async function plAuthFetch(payload){
  const ni=window.netlifyIdentity;
  const cu=ni&&((ni.gotrue&&ni.gotrue.currentUser&&ni.gotrue.currentUser())||(ni.currentUser&&ni.currentUser()));
  let t=cu&&cu.token&&cu.token.access_token;
  if(!t&&ni&&ni.refresh){ try{ await ni.refresh(); const u=ni.gotrue.currentUser(); t=u&&u.token&&u.token.access_token; }catch(_){} }
  if(!t) throw new Error('Not signed in as admin — sign out and back in, then retry.');
  const res=await fetch('/.netlify/functions/playlists',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify(payload)});
  const j=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(j.error||('HTTP '+res.status));
  return j;
}

// ── load & list ───────────────────────────────────────────────
function myEmail(){ try{ const u=netlifyIdentity.gotrue&&netlifyIdentity.gotrue.currentUser(); return ((u&&u.email)||'').toLowerCase(); }catch(_){ return ''; } }
async function loadPlaylists(){
  try{
    const {data,error}=await _sb.from('playlists').select('id, scope, owner, name, data, created_at').order('created_at',{ascending:false});
    if(error) throw error;
    const em=myEmail();
    PLAYLISTS=(data||[]).filter(p=>p.scope==='club'||(p.scope==='personal'&&p.owner===em));
    renderPlRows();
    applyDeepLink();
  }catch(e){
    document.getElementById('plRows').innerHTML='<div class="pl-empty">Could not load playlists: '+esc(e.message)+'<br><br>If this is the first use, the playlists table may not be created yet.</div>';
  }
}
// Search matches the playlist name AND its contents (clip names, players,
// games, notes) — typing a player finds every playlist containing him.
function plSearchText(p){
  const items=(p.data&&p.data.items)||[];
  return (p.name+' '+items.map(it=>[it.label,it.code,it.player,it.gameTitle,it.note].filter(Boolean).join(' ')).join(' ')).toLowerCase();
}
function renderPlRows(){
  const w=document.getElementById('plRows'); if(!w) return;
  document.getElementById('newBtn').style.display=isAdmin?'':'none';
  const q=((document.getElementById('plSearch')||{}).value||'').toLowerCase().trim();
  const list=q?PLAYLISTS.filter(p=>plSearchText(p).includes(q)):PLAYLISTS;
  if(!PLAYLISTS.length){ w.innerHTML='<div class="pl-empty">No playlists yet.'+(isAdmin?' Create one with ＋ New playlist, or select events in Code Room and “Add to playlist”.':'')+'</div>'; return; }
  if(!list.length){ w.innerHTML='<div class="pl-empty">No playlists match “'+esc(q)+'”.</div>'; return; }
  w.innerHTML=list.map(p=>{
    const cov=(CUR&&String(CUR.id)===String(p.id))?COVER:((p.data&&p.data.cover)||null);
    const art=cov?`<img class="art" src="${cov}" alt="">`
      :`<div class="art ph" style="background:hsl(${plHue(p.name)} 45% 38%)">${esc(plInitials(p.name))}</div>`;
    const n=((p.data&&p.data.items)||[]).length;
    return `<div class="plcard" onclick="openPlaylist(${p.id})">${art}
      <div class="bd"><div class="nm">${esc(p.name)}</div>
      <div class="mt">${n} clip${n===1?'':'s'} <span class="scopebadge">${p.scope==='personal'?'MINE':'CLUB'}</span></div></div>
    </div>`;}).join('');
}
async function newPlaylist(){
  const name=(prompt('Playlist name (e.g. Kickout wins v Kerry, Best scores 2026):')||'').trim();
  if(!name) return;
  const scope=await cohesionModal({title:'Who can see this playlist?',message:'Club-wide playlists are visible to every analyst, coach and player; personal playlists are only visible to you.',buttons:[{label:'Club-wide',value:'club',primary:true},{label:'Just me',value:'personal'},{label:'Cancel',value:'cancel'}]});
  if(scope==='cancel') return;
  try{
    const j=await plAuthFetch({action:'save', name, scope, data:{items:[]}});
    await loadPlaylists();
    openPlaylist(j.id);
  }catch(e){ alert('Could not create playlist: '+e.message); }
}
function openPlaylist(id){
  if(dirty && !confirm('You have unsaved changes on the current playlist. Discard them?')) return;
  CUR=PLAYLISTS.find(p=>String(p.id)===String(id)); if(!CUR) return;
  ITEMS=((CUR.data&&CUR.data.items)||[]).map(x=>({...x}));
  COVER=(CUR.data&&CUR.data.cover)||null;
  dirty=false; playIdx=-1; playAll=false;
  try{ history.replaceState(null,'',location.pathname+'?pl='+CUR.id); }catch(_){}
  document.getElementById('browse').style.display='none';
  document.getElementById('player').style.display='';
  document.getElementById('nowPlaying').textContent='Select a clip on the left to start.';
  const nn=document.getElementById('npNote'); if(nn) nn.textContent='';
  renderClips();
}
function closePlayer(){
  if(dirty && !confirm('You have unsaved changes on this playlist. Discard them?')) return;
  if(YTP&&YTP.pauseVideo) try{ YTP.pauseVideo(); }catch(_){}
  CUR=null; ITEMS=[]; COVER=null; dirty=false; playIdx=-1; playAll=false;
  try{ history.replaceState(null,'',location.pathname); }catch(_){}
  document.getElementById('player').style.display='none';
  document.getElementById('browse').style.display='';
  renderPlRows();
}

// ── clips list: rename inline, reorder (drag + ▲▼), remove ────
function markDirty(){ dirty=true; renderSaveBar(); }
function renderSaveBar(){
  const sb=document.getElementById('saveBar'); if(!sb) return;
  sb.style.display=isAdmin&&CUR?'':'none';
  const st=document.getElementById('plStatus'); if(st&&dirty){ st.textContent='Unsaved changes'; st.style.color='var(--orange)'; } else if(st){ st.textContent=''; }
}
function renderClips(){
  const w=document.getElementById('sideRows');
  document.getElementById('plName').textContent=CUR.name;
  document.getElementById('plName').className='pname'+(isAdmin?' rn':'');
  document.getElementById('plName').title=isAdmin?'Click to rename the playlist':'';
  document.getElementById('plName').onclick=isAdmin?renamePlaylist:null;
  document.getElementById('plMeta').textContent=ITEMS.length+' clips'+(CUR.scope==='personal'?' · personal':' · club-wide');
  const cv=document.getElementById('plCover'); if(cv){ if(COVER){ cv.src=COVER; cv.style.display=''; } else cv.style.display='none'; }
  const cb=document.getElementById('coverBtn'); if(cb) cb.style.display=isAdmin?'':'none';
  const cx=document.getElementById('coverRm'); if(cx) cx.style.display=(isAdmin&&COVER)?'':'none';
  if(!ITEMS.length){ w.innerHTML='<div class="pl-empty">No clips yet. Add them from Code Room: select events on the timeline, then “Add to playlist”.</div>'; renderSaveBar(); return; }
  w.innerHTML=ITEMS.map((it,i)=>{
    const noteLine = it.note
      ? `<div class="nt" id="nt${i}" ${isAdmin?`onclick="event.stopPropagation();editNote(${i})" title="Click to edit the note"`:''}>💬 ${esc(it.note)}</div>`
      : (isAdmin?`<div class="nt ghost" id="nt${i}" onclick="event.stopPropagation();editNote(${i})">＋ add coach note…</div>`:'');
    return `
    <div class="clip ${i===playIdx?'on':''}" data-i="${i}" ${isAdmin?'draggable="true"':''} onclick="playClip(${i})" title="Click to play this clip">
      <span class="idx">${i+1}</span>
      ${isAdmin?'<span class="grip" title="Drag to reorder" onclick="event.stopPropagation()">⠿</span>':''}
      <span class="lblwrap">
        <span class="lbl" id="lbl${i}" ${isAdmin?`onclick="event.stopPropagation();renameClip(${i})" title="Click to rename"`:''}>${esc(it.label||it.code||'Clip '+(i+1))}</span>
        <div class="smeta">${esc(it.gameTitle||'')}${it.angle?' · 🎥 '+esc(it.angle):''} · ${fmt(it.start)}–${fmt(it.end)}</div>
        ${noteLine}
      </span>
      ${isAdmin?`<button class="cbt x" onclick="event.stopPropagation();removeClip(${i})" title="Remove from playlist">✕</button>`:''}
    </div>`;}).join('');
  if(isAdmin) initDrag();
  renderSaveBar();
}
function renameClip(i){
  const el=document.getElementById('lbl'+i); if(!el||el.querySelector('input')) return;
  const cur=ITEMS[i].label||ITEMS[i].code||'';
  el.innerHTML=`<input value="${esc(cur)}" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value=null;this.blur();}" onblur="commitRename(${i},this.value)">`;
  const inp=el.querySelector('input'); inp.focus(); inp.select();
}
function commitRename(i,v){
  if(v!=null && v.trim()!=='' && v.trim()!==(ITEMS[i].label||'')){ ITEMS[i].label=v.trim(); markDirty(); }
  renderClips();
}
// Per-clip coach note: click to edit inline; empty note removes it.
function editNote(i){
  const el=document.getElementById('nt'+i); if(!el||el.querySelector('input')) return;
  const cur=ITEMS[i].note||'';
  el.className='nt';
  el.innerHTML=`<input value="${esc(cur)}" placeholder="e.g. Watch the run off the shoulder here" onclick="event.stopPropagation()" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.value=${esc(JSON.stringify(cur))};this.blur();}" onblur="commitNote(${i},this.value)">`;
  const inp=el.querySelector('input'); inp.focus(); inp.select();
}
function commitNote(i,v){
  const nv=(v||'').trim();
  if(nv!==(ITEMS[i].note||'')){ if(nv) ITEMS[i].note=nv; else delete ITEMS[i].note; markDirty(); }
  renderClips();
}
// ── cover image: any picture becomes a centre-cropped 256px square JPEG
// (~20-40KB), stored inside the playlist itself — no file server needed.
function plInitials(name){ return String(name||'?').split(/\s+/).map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase()||'?'; }
function plHue(name){ let h=0; for(const ch of String(name||'')) h=(h*31+ch.charCodeAt(0))%360; return h; }
function plCompressImage(file){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file), img=new Image();
    img.onload=()=>{ try{
      const S=256, cv=document.createElement('canvas'); cv.width=S; cv.height=S;
      const side=Math.min(img.width,img.height);
      cv.getContext('2d').drawImage(img,(img.width-side)/2,(img.height-side)/2,side,side,0,0,S,S);
      URL.revokeObjectURL(url);
      const out=cv.toDataURL('image/jpeg',0.82);
      if(out.length>200000) rej(new Error('Image could not be compressed enough.')); else res(out);
    }catch(e){ rej(e); } };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('Could not read that image.')); };
    img.src=url;
  });
}
async function plPickCover(input){
  const f=(input.files||[])[0]; input.value='';
  if(!f||!CUR) return;
  try{ COVER=await plCompressImage(f); markDirty(); renderClips(); renderPlRows(); }
  catch(e){ alert(e.message||'Could not use that image.'); }
}
function plRemoveCover(){ if(!CUR) return; COVER=null; markDirty(); renderClips(); renderPlRows(); }
// ── Share link: playlists.html?pl=<id>[&clip=<n>] ─────────────
// Recipients sign in with the normal club login and land straight on the
// playlist (personal playlists stay invisible to anyone but their owner).
function sharePlaylist(){
  if(!CUR) return;
  const url=location.origin+location.pathname+'?pl='+CUR.id;
  const done=()=>{ const b=document.getElementById('shareBtn'); if(b){ b.textContent='✓ Copied'; setTimeout(()=>{ b.textContent='🔗 Share'; },1600); } };
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(url).then(done,()=>prompt('Copy this link:',url));
  else prompt('Copy this link:',url);
}
let deepLinked=false;
function applyDeepLink(){
  if(deepLinked||!PLAYLISTS.length) return;
  deepLinked=true;
  const p=new URLSearchParams(location.search);
  const id=p.get('pl'); if(!id) return;
  const found=PLAYLISTS.find(x=>String(x.id)===String(id));
  if(!found){ alert("That playlist isn't available to this account."); return; }
  openPlaylist(found.id);
  const ci=parseInt(p.get('clip'),10);
  if(ci>=1&&ci<=ITEMS.length) setTimeout(()=>playClip(ci-1),400);
}
function renamePlaylist(){
  const name=(prompt('Rename playlist:',CUR.name)||'').trim();
  if(!name||name===CUR.name) return;
  CUR.name=name; markDirty(); renderClips(); renderPlRows();
}
function moveClip(i,d){
  const j=i+d; if(j<0||j>=ITEMS.length) return;
  const [it]=ITEMS.splice(i,1); ITEMS.splice(j,0,it);
  if(playIdx===i) playIdx=j; else if(playIdx===j) playIdx=i;
  markDirty(); renderClips();
}
function removeClip(i){
  ITEMS.splice(i,1);
  if(playIdx===i) playIdx=-1; else if(playIdx>i) playIdx--;
  markDirty(); renderClips();
}
// HTML5 drag & drop reordering
function initDrag(){
  let src=null;
  document.querySelectorAll('.clip').forEach(row=>{
    row.addEventListener('dragstart',e=>{ src=+row.dataset.i; e.dataTransfer.effectAllowed='move'; });
    row.addEventListener('dragover',e=>{ e.preventDefault(); row.classList.add('dragover'); });
    row.addEventListener('dragleave',()=>row.classList.remove('dragover'));
    row.addEventListener('drop',e=>{
      e.preventDefault(); row.classList.remove('dragover');
      const dst=+row.dataset.i; if(src==null||src===dst) return;
      const [it]=ITEMS.splice(src,1); ITEMS.splice(dst,0,it);
      playIdx=-1; markDirty(); renderClips(); src=null;
    });
  });
}

// ── save / delete ─────────────────────────────────────────────
async function savePlaylist(){
  if(!CUR) return;
  const btn=document.getElementById('saveBtn'); btn.disabled=true; btn.textContent='Saving…';
  try{
    const payload={items:ITEMS}; if(COVER) payload.cover=COVER;
    await plAuthFetch({action:'save', id:CUR.id, name:CUR.name, scope:CUR.scope, data:payload});
    CUR.data={items:ITEMS.map(x=>({...x}))}; if(COVER) CUR.data.cover=COVER; dirty=false;
    const st=document.getElementById('plStatus'); st.textContent='Saved ✓'; st.style.color='var(--green)';
    renderPlRows();
  }catch(e){ alert('Could not save: '+e.message); }
  btn.disabled=false; btn.textContent='💾 Save changes';
  renderSaveBar(); if(!dirty){ const st=document.getElementById('plStatus'); st.textContent='Saved ✓'; st.style.color='var(--green)'; }
}
async function deletePlaylist(){
  if(!CUR) return;
  if(!confirm('Delete playlist "'+CUR.name+'" ('+ITEMS.length+' clips)? This cannot be undone.')) return;
  try{
    await plAuthFetch({action:'delete', id:CUR.id});
    CUR=null; ITEMS=[]; COVER=null; dirty=false;
    try{ history.replaceState(null,'',location.pathname); }catch(_){}
    document.getElementById('player').style.display='none';
    document.getElementById('browse').style.display='';
    await loadPlaylists();
  }catch(e){ alert('Could not delete: '+e.message); }
}

// ── playback: YouTube segments with auto-advance ──────────────
function ensurePlayer(cb){
  if(YTP){ cb(); return; }
  const boot=()=>{ YTP=new YT.Player('ytMount',{playerVars:{rel:0,modestbranding:1,enablejsapi:1,origin:location.origin},events:{onReady:cb,onStateChange:onState}}); };
  if(window.YT&&window.YT.Player) boot();
  else { window.onYouTubeIframeAPIReady=boot; const s=document.createElement('script'); s.src='https://www.youtube.com/iframe_api'; document.head.appendChild(s); }
}
function playClip(i){
  if(!ITEMS[i]) return;
  playIdx=i;
  ensurePlayer(()=>{
    const it=ITEMS[i];
    YTP.loadVideoById({videoId:it.videoId, startSeconds:Math.max(0,Math.floor(it.start||0)), endSeconds:Math.max(1,Math.ceil(it.end||((it.start||0)+8)))});
    curVideoId=it.videoId;
    document.getElementById('nowPlaying').textContent=(i+1)+'/'+ITEMS.length+' — '+(it.label||it.code||'Clip')+(it.gameTitle?' · '+it.gameTitle:'')+(it.angle?' · 🎥 '+it.angle:'');
    const nn=document.getElementById('npNote'); if(nn) nn.textContent=it.note?'💬 '+it.note:'';
    // present-mode overlay
    document.getElementById('poIdx').textContent=(i+1)+' / '+ITEMS.length+(it.gameTitle?'  ·  '+it.gameTitle.toUpperCase():'')+(it.angle?'  ·  '+it.angle.toUpperCase():'');
    document.getElementById('poLbl').textContent=it.label||it.code||'Clip '+(i+1);
    document.getElementById('poNote').textContent=it.note||'';
    // per-clip angle buttons (each clip resets to its captured angle)
    plAngleIdx=null;
    loadGamesMeta().then(()=>{ if(playIdx===i) renderAngleBtns(); });
  });
  renderClips();
}

// ── Present mode: fullscreen playback with name + note overlaid ──
function togglePresent(){
  const st=document.getElementById('stage');
  if(document.fullscreenElement){ (document.exitFullscreen||function(){}).call(document); return; }
  const rf=st.requestFullscreen||st.webkitRequestFullscreen;
  if(rf) rf.call(st);
  if(playIdx<0 && ITEMS.length){ playAll=true; const b=document.getElementById('playAllBtn'); b.classList.add('on'); b.textContent='⏸ Playing…'; playClip(0); }
}
document.addEventListener('keydown',e=>{
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
  if(!CUR) return;
  if(e.key==='ArrowRight'){ e.preventDefault(); if(e.shiftKey) nextClip(); else seekRel(5); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); if(e.shiftKey) prevClip(); else seekRel(-5); }
});
function onState(e){
  if(e.data===0 && playAll){        // segment ended → next
    if(playIdx+1<ITEMS.length) playClip(playIdx+1);
    else if(loop && ITEMS.length) playClip(0);
    else { playAll=false; document.getElementById('playAllBtn').classList.remove('on'); document.getElementById('playAllBtn').textContent='▶ Play all'; }
  }
}
function togglePlayAll(){
  playAll=!playAll;
  const b=document.getElementById('playAllBtn');
  b.classList.toggle('on',playAll); b.textContent=playAll?'⏸ Playing…':'▶ Play all';
  if(playAll) playClip(playIdx>=0?playIdx:0);
  else if(YTP&&YTP.pauseVideo) YTP.pauseVideo();
}
// ±5s inside the current clip (clamped to the clip's own window).
function seekRel(d){
  if(!YTP||!YTP.getCurrentTime||playIdx<0||!ITEMS[playIdx]) return;
  const it=ITEMS[playIdx];
  let t=(YTP.getCurrentTime()||0)+d;
  t=Math.max(Math.floor(it.start||0), Math.min(t, Math.ceil(it.end||(t+1))-0.5));
  YTP.seekTo(t,true);
}
// Seeking can clear YouTube's end-of-segment cue, letting a clip overrun.
// A light watchdog restores clip-end behaviour: advance (Play all) or pause.
setInterval(()=>{
  if(!YTP||!YTP.getCurrentTime||playIdx<0) return;
  const it=ITEMS[playIdx]; if(!it||it.end==null) return;
  if((YTP.getCurrentTime()||0)>Math.ceil(it.end)+0.4){
    if(playAll){
      if(playIdx+1<ITEMS.length) playClip(playIdx+1);
      else if(loop&&ITEMS.length) playClip(0);
      else { playAll=false; const b=document.getElementById('playAllBtn'); if(b){ b.classList.remove('on'); b.textContent='▶ Play all'; } YTP.pauseVideo&&YTP.pauseVideo(); }
    } else if(YTP.pauseVideo) YTP.pauseVideo();
  }
},500);
function nextClip(){ if(playIdx+1<ITEMS.length) playClip(playIdx+1); else if(loop&&ITEMS.length) playClip(0); }
function prevClip(){ if(playIdx>0) playClip(playIdx-1); else if(loop&&ITEMS.length) playClip(ITEMS.length-1); }
function toggleLoop(){ loop=!loop; document.getElementById('loopBtn').classList.toggle('on',loop); }

// ── Per-clip angle switching ──────────────────────────────────
// A clip stores its main-reference moment (driveT) and game id, so when its
// game has several camera angles the same moment can be re-derived on any of
// them. Switching is view-time only — the stored clip keeps its captured
// angle. Games' angle tables are read once from the games table and cached.
let GAMESMETA=null, plAngleIdx=null;   // plAngleIdx = view override for the CURRENT clip
async function loadGamesMeta(){
  if(GAMESMETA) return GAMESMETA;
  GAMESMETA={};
  try{
    const {data,error}=await _sb.from('games').select('meta');
    if(error) throw error;
    (data||[]).forEach(r=>{ let m=r.meta; if(typeof m==='string'){ try{ m=JSON.parse(m); }catch(_){ return; } } if(m&&m.id) GAMESMETA[m.id]=m; });
  }catch(_){}
  return GAMESMETA;
}
function plDriveToAngle(angles,driveT,idx){
  const m=angles[0],t=angles[idx]; if(!t||idx===0) return driveT;
  let period,gck;
  if(m.et2Start&&driveT>=m.et2Start){period='et2';gck=driveT-m.et2Start;}
  else if(m.et1Start&&driveT>=m.et1Start){period='et1';gck=driveT-m.et1Start;}
  else if(driveT>=(m.half2Start||0)){period='2h';gck=driveT-(m.half2Start||0);}
  else{period='1h';gck=driveT-(m.half1Start||0);}
  const ts=period==='et2'?(t.et2Start??t.half2Start):period==='et1'?(t.et1Start??t.half2Start):period==='2h'?t.half2Start:t.half1Start;
  return Math.max(0,(ts||0)+gck);
}
// Angle table for a clip's game — only if switching is possible (2+ angled
// videos AND the clip carries a main-ref driveT to re-derive from).
function plAnglesFor(it){
  if(it==null||it.driveT==null||!it.gameId||!GAMESMETA) return null;
  const g=GAMESMETA[it.gameId]; if(!g) return null;
  const A=(Array.isArray(g.angles)&&g.angles.length)?g.angles:[{label:'Main',youtubeId:g.youtubeId,half1Start:g.half1Start||0,half2Start:g.half2Start||0,et1Start:g.et1Start||null,et2Start:g.et2Start||null}];
  return A.filter(a=>a&&a.youtubeId).length>=2 ? A : null;
}
function renderAngleBtns(){
  const grp=document.getElementById('plAngleGrp'); if(!grp) return;
  const it=ITEMS[playIdx], A=plAnglesFor(it);
  if(!A){ grp.style.display='none'; grp.innerHTML=''; return; }
  const cur=plAngleIdx!=null?plAngleIdx:Math.max(0,A.findIndex(a=>a.youtubeId===it.videoId));
  grp.style.display='flex';
  grp.innerHTML=A.map((a,i)=>`<span class="angbtn${i===cur?' on':''}" onclick="plSwitchAngle(${i})" title="View this clip from ${esc(a.label||('Cam '+(i+1)))}">${esc(a.label||('Cam '+(i+1)))}</span>`).join('');
}
function plSwitchAngle(i){
  const it=ITEMS[playIdx], A=plAnglesFor(it); if(!A||!A[i]||!A[i].youtubeId) return;
  const cur=plAngleIdx!=null?plAngleIdx:Math.max(0,A.findIndex(a=>a.youtubeId===it.videoId));
  if(i===cur) return;
  plAngleIdx=i;
  const dur=Math.max(1,(it.end||0)-(it.start||0));
  const vs=plDriveToAngle(A,it.driveT,i);
  YTP.loadVideoById({videoId:A[i].youtubeId, startSeconds:Math.max(0,Math.floor(vs)), endSeconds:Math.max(1,Math.ceil(vs+dur))});
  const nm=A[i].label||('Cam '+(i+1));
  document.getElementById('nowPlaying').textContent=(playIdx+1)+'/'+ITEMS.length+' — '+(it.label||it.code||'Clip')+(it.gameTitle?' · '+it.gameTitle:'')+' · 🎥 '+nm;
  document.getElementById('poIdx').textContent=(playIdx+1)+' / '+ITEMS.length+(it.gameTitle?'  ·  '+it.gameTitle.toUpperCase():'')+'  ·  '+nm.toUpperCase();
  renderAngleBtns();
}

// ── leave guard (unsaved playlist edits) ──────────────────────
cohesionSetGuard(()=>dirty, savePlaylist);
function plGo(t){ cohesionGuardedGo(t); return false; }

netlifyIdentity.on('init',()=>loadPlaylists());
netlifyIdentity.init();
setTimeout(()=>{ if(!PLAYLISTS.length) loadPlaylists(); },1500);
</script>
