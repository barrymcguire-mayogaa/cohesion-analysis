# Netlify Configuration for Cohesion Analysis

[build]
  command = ""
  publish = "."
  functions = "netlify/functions"
  # Ignore false-positive secret detection for public Supabase credentials
  # SUPABASE_URL and SUPABASE_KEY are public (used in browser code)
  # Only SUPABASE_SERVICE_ROLE_KEY is actually sensitive (server-side only)
  environment = { SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_KEY" }

[dev]
  framework = "static"
  publish = "."

# Static site - serve files as-is, no SPA redirect needed
# This is NOT a single-page app, so don't redirect to index.html

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
